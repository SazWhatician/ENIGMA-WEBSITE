<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ENIGMA | Contact</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Host+Grotesk:ital,wght@0,300..800;1,300..800&family=Syncopate:wght@400;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/@barba/core"></script>
    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        void: '#000000', orbitGreen: '#2BA648', orbitDark: '#0F3918',
                    },
                    fontFamily: {
                        sans: ['"Host Grotesk"', 'sans-serif'], syncopate: ['"Syncopate"', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        /* --- UNIFIED CSS --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar { display: none; }
        html { -ms-overflow-style: none; scrollbar-width: none; }

        /* Blueprint Background */
        .blueprint-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .bp-circle {
            position: absolute;
            width: 90vmin;
            height: 90vmin;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 50%;
        }

        .bp-line-h {
            position: absolute;
            width: 100vw;
            height: 1px;
            background: rgba(255, 255, 255, 0.05);
        }

        .bp-line-v {
            position: absolute;
            width: 1px;
            height: 100vh;
            background: rgba(255, 255, 255, 0.05);
        }

        .bp-line-d1 {
            position: absolute;
            width: 150vw;
            height: 1px;
            background: rgba(255, 255, 255, 0.03);
            transform: rotate(30deg);
        }

        .bp-line-d2 {
            position: absolute;
            width: 150vw;
            height: 1px;
            background: rgba(255, 255, 255, 0.03);
            transform: rotate(-30deg);
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            padding: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            mix-blend-mode: difference;
        }

        nav,
        .logo p {
            font-weight: 700;
            font-size: 0.9rem;
            font-family: "Host Grotesk", sans-serif;
        }

        .logo a {
            text-decoration: none;
            color: white;
        }

        .nav-items {
            display: flex;
            gap: 2rem;
        }

        .nav-items a {
            text-decoration: none;
            color: white;
            transition: color 0.3s;
        }

        .nav-items a:hover {
            color: #2BA648;
        }

        @media(max-width: 768px) {
            nav {
                padding: 1.5rem;
            }

            .nav-items {
                gap: 1rem;
                font-size: 0.8rem;
            }
        }

        /* Page Transitions */
        .page-transition {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
            pointer-events: none;
            display: flex;
        }

        .transition-panel {
            flex: 1;
            height: 100%;
            background-color: #2BA648;
            transform: translateY(100%);
            will-change: transform;
        }

        /* Container */
        .contact-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 10rem 2rem;
        }

        /* --- ENIGMA FORM STYLES --- */
        .input-wrapper {
            position: relative;
            margin-top: 1.5rem;
            padding-top: 1rem;
        }

        .terminal-input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding: 0.5rem 0;
            color: white;
            font-family: 'Host Grotesk', sans-serif;
            transition: border-color 0.3s;
        }

        .terminal-input:focus {
            outline: none;
            border-bottom-color: transparent;
        }

        .input-line {
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 1px;
            background: #2BA648;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            transform: translateX(-50%);
        }

        .terminal-input:focus~.input-line {
            width: 100%;
            height: 2px;
            box-shadow: 0 0 10px rgba(43, 166, 72, 0.5);
        }

        .terminal-label {
            position: absolute;
            top: 1rem;
            left: 0;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: rgba(255, 255, 255, 0.5);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
        }

        .terminal-input:focus~.terminal-label,
        .terminal-input:valid~.terminal-label {
            top: -0.5rem;
            font-size: 0.65rem;
            color: #2BA648;
            letter-spacing: 0.2em;
        }

        /* --- CYBER BUTTON --- */
        .btn-cyber {
            position: relative;
            overflow: hidden;
            border: 1px solid #2BA648;
            background: rgba(43, 166, 72, 0.05);
            color: #2BA648;
            z-index: 1;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
        }

        .btn-cyber::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 0%;
            background: #2BA648;
            z-index: -1;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .btn-cyber:hover {
            color: #000;
            letter-spacing: 0.3em;
            box-shadow: 0 0 25px rgba(43, 166, 72, 0.4);
        }

        .btn-cyber:hover::before {
            height: 100%;
        }

        .btn-cyber::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 20%;
            background: rgba(255, 255, 255, 0.3);
            transform: rotate(45deg);
            transition: all 0.4s ease;
            opacity: 0;
            pointer-events: none;
        }

        .btn-cyber:hover::after {
            animation: scan 1.5s linear infinite;
            opacity: 1;
        }

        @keyframes scan {
            0% {
                top: -50%;
                left: -50%;
            }

            100% {
                top: 150%;
                left: 150%;
            }
        }

        /* --- FOOTER SECTION --- */
        :root {
            --base-orbit: #000000;
            --accent-glow: #2BA648;
        }
        .reactor-zone h1 {
            font-weight: 300;
            font-size: clamp(3rem, 5vw, 6rem);
            margin: 0; line-height: 1;
            letter-spacing: -0.02em;
        }
        .reactor-zone h3 {
            font-weight: 400;
            font-size: clamp(1.25rem, 1.75vw, 2.5rem);
            margin: 0; color: #94a3b8;
        }
        .reactor-zone a {
            text-decoration: none; color: #fff; display: block;
            font-size: clamp(1.25rem, 1.75vw, 2.5rem);
            font-weight: 300; transition: all 0.4s ease;
        }
        .reactor-zone a:hover {
            color: var(--accent-glow);
            transform: translateX(10px);
            text-shadow: 0 0 10px rgba(43, 166, 72, 0.5);
        }
        .glow-text {
            text-shadow: 0 0 5px rgba(43, 166, 72, 0.8), 0 0 20px rgba(24, 93, 40, 0.5);
        }
        footer {
            position: relative; width: 100%;
            height: 100vh; height: 100svh;
            background-color: var(--base-orbit);
            overflow: hidden; z-index: 1;
        }
        .footer-container {
            position: relative; width: 100%; height: 100%; padding: 3rem;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        #footer-canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: -1;
        }
        .footer-content {
            position: relative; width: 100%; height: 100%; z-index: 1;
            padding-top: 100px;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .footer-row {
            display: flex; justify-content: space-between; width: 100%;
        }
        .footer-col { flex: 1; }
        .footer-col-right {
            flex: 1; display: flex; gap: 4rem; justify-content: flex-end;
        }
        .footer-sub-col {
            display: flex; flex-direction: column; gap: 1rem; text-align: right;
        }
        @media(max-width: 1000px) {
            .footer-row { flex-direction: column; gap: 4rem; }
            .footer-col-right { justify-content: flex-start; gap: 2rem; }
            .footer-sub-col { text-align: left; }
        }
    </style>
</head>

<body data-barba="wrapper">

    <div class="page-transition">
        <div class="transition-panel"></div>
        <div class="transition-panel"></div>
        <div class="transition-panel"></div>
    </div>

    <div class="blueprint-bg">
        <div class="bp-circle"></div>
        <div class="bp-line-h"></div>
        <div class="bp-line-v"></div>
        <div class="bp-line-d1"></div>
        <div class="bp-line-d2"></div>
    </div>

    <nav>
        <div class="logo"><a href="index.html" data-barba-prevent>ENIGMA.</a></div>
        <div class="nav-items">
            <a href="index.html" data-barba-prevent>Events</a>
            <a href="project.html">Projects</a>
            <a href="team.html">Team</a>
            <a href="contact.html" class="text-orbitGreen">Contact</a>
        </div>
    </nav>

    <main data-barba="container" data-barba-namespace="contact">
        <div class="contact-container">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-16 items-start">

                <div class="contact-info">
                    <h1 class="font-syncopate text-5xl md:text-7xl mb-6 leading-tight" id="contact-title">
                        GET IN<br><span class="text-orbitGreen">TOUCH</span>
                    </h1>
                    <p class="text-gray-400 max-w-sm mb-8" id="contact-sub">Have a project in mind or just want to say
                        hi? Send us a transmission.</p>
                    <div class="space-y-4 text-sm font-bold uppercase tracking-widest">
                        <p class="text-orbitGreen">Secure Frequency</p>
                        <p>hello@enigma.vision</p>
                    </div>
                </div>

                <form id="contact-form" class="space-y-8 opacity-0 translate-y-10">
                    <div class="grid grid-cols-1 gap-4">

                        <div class="input-wrapper">
                            <input type="text" name="user_name" required class="terminal-input">
                            <label class="terminal-label">Designation / Name</label>
                            <div class="input-line"></div>
                        </div>

                        <div class="input-wrapper">
                            <input type="email" name="user_email" required class="terminal-input">
                            <label class="terminal-label">Secure Frequency (Email)</label>
                            <div class="input-line"></div>
                        </div>

                        <div class="input-wrapper" style="margin-top: 2rem;">
                            <textarea name="message" rows="4" required class="terminal-input resize-none"></textarea>
                            <label class="terminal-label">Transmission Data</label>
                            <div class="input-line"></div>
                        </div>

                    </div>

                    <button type="submit" id="submit-btn"
                        class="btn-cyber w-full py-5 font-bold uppercase tracking-widest mt-4">
                        Initiate Transfer
                    </button>

                    <p id="form-status" class="text-xs uppercase text-center mt-4 tracking-widest opacity-0"></p>
                </form>

            </div>
        </div>

        <footer class="reactor-zone">
            <div class="footer-container">
                <div id="footer-canvas"></div>
                <div class="footer-content">
                    <div class="footer-row">
                        <div class="footer-col">
                            <h1 class="glow-text">Connect<br> with<br> Us</h1>
                        </div>
                        <div class="footer-col footer-col-right">
                            <div class="footer-sub-col">
                                <h3>Socials</h3>
                                <a href="#">Instagram</a><a href="#">X</a><a href="#">LinkedIn</a>
                            </div>
                            <div class="footer-sub-col">
                                <h3>Menu</h3>
                                <a href="#">Home</a><a href="contact.html">Contact</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </footer>
    </main>

    <script>
            // --- EMAILJS CONFIG ---
            // Replace with your actual Public Key from EmailJS Dashboard
            (function () {
                emailjs.init("YOUR_PUBLIC_KEY");
            })();

        function initContactPage() {
            const form = document.getElementById('contact-form');
            const status = document.getElementById('form-status');
            const btn = document.getElementById('submit-btn');

            // Prevent initialization errors if navigating away quickly
            if (!form) return;

            // Entrance Animations
            gsap.to("#contact-form", { opacity: 1, y: 0, duration: 1, ease: "power3.out", delay: 0.5 });
            gsap.from("#contact-title", { x: -50, opacity: 0, duration: 1, ease: "power3.out", delay: 0.2 });
            gsap.from("#contact-sub", { opacity: 0, duration: 1, ease: "power3.out", delay: 0.4 });

            form.onsubmit = function (e) {
                e.preventDefault();

                // Button click animation
                gsap.to(btn, { scale: 0.95, duration: 0.1, yoyo: true, repeat: 1 });

                btn.innerText = "ENCRYPTING DATA...";
                btn.classList.add('animate-pulse');
                btn.disabled = true;

                // Send through EmailJS (Replace Service ID and Template ID)
                emailjs.sendForm('YOUR_SERVICE_ID', 'YOUR_TEMPLATE_ID', this)
                    .then(() => {
                        // Success Sequence
                        btn.classList.remove('animate-pulse');

                        let tl = gsap.timeline();
                        tl.to(btn, { opacity: 0, duration: 0.2 })
                            .call(() => {
                                btn.innerText = "TRANSMISSION SUCCESSFUL";
                                btn.style.background = "#2BA648";
                                btn.style.color = "#000";
                                form.reset();
                            })
                            .to(btn, { opacity: 1, duration: 0.4, ease: "power2.out" })
                            .to(status, { opacity: 1, text: "Data received by ENIGMA mainframe.", color: "#2BA648", duration: 0.5 });

                    }, (error) => {
                        // Error Sequence
                        btn.classList.remove('animate-pulse');
                        btn.innerText = "SYSTEM FAILURE - RETRY";
                        btn.disabled = false;
                        gsap.to(status, { opacity: 1, text: "Error: Connection lost.", color: "red", duration: 0.5 });
                        console.error('EmailJS Error:', error);
                    });
            };
        }

        // Initialize on direct load
        document.addEventListener('DOMContentLoaded', initContactPage);
    </script>

    <script>
        // =============================================
        // FOOTER CRYSTAL 3D SCENE
        // =============================================
        gsap.registerPlugin(ScrollTrigger);

        (function initFooterCrystal() {
            const footerContainerEl = document.getElementById('footer-canvas');
            if (!footerContainerEl) return;

            const footerScene = new THREE.Scene();
            footerScene.fog = new THREE.FogExp2(0x000000, 0.1);

            const footerCamera = new THREE.PerspectiveCamera(75, footerContainerEl.offsetWidth / footerContainerEl.offsetHeight, 0.1, 1000);
            footerCamera.position.set(0, 0, 5);
            const footerRenderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            footerRenderer.setSize(footerContainerEl.offsetWidth, footerContainerEl.offsetHeight);
            footerRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            footerRenderer.toneMapping = THREE.ReinhardToneMapping;
            footerContainerEl.appendChild(footerRenderer.domElement);

            footerScene.add(new THREE.AmbientLight(0x000000));

            const pointLight = new THREE.PointLight(0x2BA648, 5, 50);
            pointLight.position.set(0, 0, 0);
            footerScene.add(pointLight);

            const rimLight = new THREE.DirectionalLight(0x185D28, 4);
            rimLight.position.set(5, 5, 5);
            footerScene.add(rimLight);

            const crystalGroup = new THREE.Group();
            footerScene.add(crystalGroup);

            const innerCrystal = new THREE.Mesh(
                new THREE.OctahedronGeometry(1.2, 0),
                new THREE.MeshStandardMaterial({
                    color: 0x2BA648,
                    emissive: 0x0F3918,
                    emissiveIntensity: 1,
                    roughness: 0.1,
                    metalness: 0.8
                })
            );
            crystalGroup.add(innerCrystal);

            const outerCage = new THREE.Mesh(
                new THREE.IcosahedronGeometry(1.6, 0),
                new THREE.MeshStandardMaterial({
                    color: 0xffffff,
                    wireframe: true,
                    transparent: true,
                    opacity: 0.25
                })
            );
            crystalGroup.add(outerCage);

            const particlesGeo = new THREE.BufferGeometry();
            const posArray = new Float32Array(800 * 3);
            for (let i = 0; i < 800 * 3; i++) posArray[i] = (Math.random() - 0.5) * 12;
            particlesGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            const particles = new THREE.Points(
                particlesGeo,
                new THREE.PointsMaterial({ size: 0.015, color: 0x2BA648, transparent: true, opacity: 0.6 })
            );
            crystalGroup.add(particles);

            const footerMouse = { x: 0, y: 0 };
            document.querySelector('footer').addEventListener('mousemove', (e) => {
                footerMouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                footerMouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            });

            const footerContentContainer = document.querySelector('.footer-container');
            gsap.set(footerContentContainer, { yPercent: -50 });
            let scrollProgress = 0;

            ScrollTrigger.create({
                trigger: 'footer', start: 'top bottom', end: 'bottom bottom', scrub: true,
                onUpdate: (self) => {
                    scrollProgress = self.progress;
                    gsap.set(footerContentContainer, { yPercent: -50 * (1 - scrollProgress) });
                }
            });

            window.addEventListener('resize', () => {
                footerCamera.aspect = footerContainerEl.offsetWidth / footerContainerEl.offsetHeight;
                footerCamera.updateProjectionMatrix();
                footerRenderer.setSize(footerContainerEl.offsetWidth, footerContainerEl.offsetHeight);
            });

            function animateFooter() {
                requestAnimationFrame(animateFooter);
                const time = performance.now() * 0.001;

                innerCrystal.rotation.y += 0.01;
                innerCrystal.rotation.x += 0.005;
                outerCage.rotation.y -= 0.005;
                outerCage.rotation.z += 0.002;
                particles.rotation.y += 0.001;

                const scale = 1 + Math.sin(time * 2) * 0.05;
                innerCrystal.scale.set(scale, scale, scale);

                const targetZ = -5 + (scrollProgress * 5);
                crystalGroup.position.z += (targetZ - crystalGroup.position.z) * 0.05;
                crystalGroup.rotation.x += (footerMouse.y * 0.2 - crystalGroup.rotation.x) * 0.05;
                crystalGroup.rotation.y += (footerMouse.x * 0.2 - crystalGroup.rotation.y) * 0.05;

                footerRenderer.render(footerScene, footerCamera);
            }
            animateFooter();
        })();
    </script>
</body>

</html>
