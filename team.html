<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ENIGMA | Team</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Host+Grotesk:ital,wght@0,300..800;1,300..800&family=Syncopate:wght@400;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/@barba/core"></script>
    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        void: '#000000', orbitGreen: '#2BA648', orbitDark: '#0F3918',
                    },
                    fontFamily: {
                        sans: ['"Host Grotesk"', 'sans-serif'], syncopate: ['"Syncopate"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>

<body data-barba="wrapper">

    <!-- BARBA TRANSITION PANELS -->
    <div class="page-transition">
        <div class="transition-panel"></div>
        <div class="transition-panel"></div>
        <div class="transition-panel"></div>
    </div>

    <!-- BLUEPRINT BACKGROUND -->
    <div class="blueprint-bg">
        <div class="bp-circle"></div>
        <div class="bp-line-h"></div>
        <div class="bp-line-v"></div>
        <div class="bp-line-d1"></div>
        <div class="bp-line-d2"></div>
    </div>

    <!-- BREATHING GRADIENT -->
    <div class="breathing-gradient"></div>

    <!-- LOADING SCREEN -->
    <div id="loading-screen"
        style="position: fixed; inset: 0; z-index: 50; display: flex; justify-content: center; align-items: center; background-color: #000; font-family: 'Syncopate', sans-serif; font-size: 2rem; color: #2BA648; flex-direction: column; gap: 1rem;">
        <img src="./image-assets/white-no bg.png" class="w-8 h-8 animate-[spin_4s_linear_infinite]">
    </div>

    <!-- ====== MAIN BARBA CONTAINER ====== -->
    <main data-barba="container" data-barba-namespace="team">

    <!-- ALL STYLES INSIDE BARBA CONTAINER so they load during Barba transitions -->
    <style>
        /* ============================================
           GLOBAL RESET & BASE
           ============================================ */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #000;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            font-family: "Host Grotesk", sans-serif;
        }
        ::-webkit-scrollbar { display: none; }
        html { -ms-overflow-style: none; scrollbar-width: none; scroll-behavior: smooth; }

        /* ============================================
           BLUEPRINT BACKGROUND
           ============================================ */
        .blueprint-bg {
            position: fixed; inset: 0; z-index: 0;
            pointer-events: none;
            display: flex; justify-content: center; align-items: center;
        }
        .bp-circle {
            position: absolute; width: 90vmin; height: 90vmin;
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 50%;
        }
        .bp-line-h { position: absolute; width: 100vw; height: 1px; background: rgba(255, 255, 255, 0.04); }
        .bp-line-v { position: absolute; width: 1px; height: 100vh; background: rgba(255, 255, 255, 0.04); }
        .bp-line-d1 { position: absolute; width: 150vw; height: 1px; background: rgba(255, 255, 255, 0.025); transform: rotate(30deg); }
        .bp-line-d2 { position: absolute; width: 150vw; height: 1px; background: rgba(255, 255, 255, 0.025); transform: rotate(-30deg); }

        /* ============================================
           BREATHING RADIAL GRADIENT
           ============================================ */
        .breathing-gradient {
            position: fixed;
            top: 50%; left: 50%;
            width: 120vmax; height: 120vmax;
            transform: translate(-50%, -50%);
            background: radial-gradient(ellipse at center, rgba(43, 166, 72, 0.04) 0%, transparent 60%);
            animation: breathe 8s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }
        @keyframes breathe {
            0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
        }

        /* ============================================
           NAVIGATION
           ============================================ */
        nav {
            position: fixed; top: 0; left: 0; width: 100vw;
            padding: 2rem;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100;
            mix-blend-mode: difference;
        }
        nav, .logo p { font-weight: 700; font-size: 0.9rem; font-family: "Host Grotesk", sans-serif; }
        .logo a { text-decoration: none; color: white; }
        .nav-items { display: flex; gap: 2rem; }
        .nav-items a {
            text-decoration: none; color: white;
            transition: all 0.3s ease;
            position: relative;
        }
        .nav-items a:hover {
            color: #2BA648;
            text-shadow: 0 0 10px rgba(43, 166, 72, 0.6);
        }
        @media(max-width: 768px) {
            nav { padding: 1.5rem; }
            .nav-items { gap: 1rem; font-size: 0.8rem; }
        }

        /* ============================================
           HERO SECTION
           ============================================ */
        .team-hero {
            position: relative;
            width: 100%;
            min-height: 50vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding-top: 6rem;
        }
        .hero-svg-bg {
            position: absolute;
            inset: 0;
            z-index: 0;
            opacity: 0.15;
        }
        .circuit-line {
            stroke: #2BA648;
            stroke-width: 1;
            fill: none;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            filter: drop-shadow(0 0 3px rgba(43, 166, 72, 0.5));
        }
        .circuit-dot {
            fill: #2BA648;
            filter: drop-shadow(0 0 4px rgba(43, 166, 72, 0.8));
            opacity: 0;
        }
        .hero-title {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(3rem, 8vw, 7rem);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            z-index: 2;
            position: relative;
            line-height: 1;
        }
        .hero-title .letter {
            display: inline-block;
            opacity: 0;
            transform: translateY(40px);
            color: transparent;
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.15);
            transition: color 0.6s ease, -webkit-text-stroke-color 0.6s ease;
        }
        .hero-title .letter.revealed {
            color: #fff;
            -webkit-text-stroke: 0;
            text-shadow: 0 0 30px rgba(43, 166, 72, 0.4), 0 0 60px rgba(43, 166, 72, 0.15);
        }
        .hero-subtitle {
            font-family: 'Host Grotesk', sans-serif;
            font-size: clamp(0.9rem, 1.5vw, 1.2rem);
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-top: 1.5rem;
            z-index: 2;
            opacity: 0;
            transform: translateY(20px);
        }
        .hero-line {
            width: 60px; height: 2px;
            background: linear-gradient(90deg, transparent, #2BA648, transparent);
            margin-top: 2rem;
            z-index: 2;
            opacity: 0;
            transform: scaleX(0);
        }

        /* ============================================
           FILTER BAR
           ============================================ */
        .filters-wrapper {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-bottom: 3rem;
            font-family: 'Syncopate', sans-serif;
            position: relative;
            z-index: 10;
            padding: 0 1rem;
        }
        .filter-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.5);
            padding: 0.6rem 1.8rem;
            font-size: 0.75rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            position: relative;
            overflow: hidden;
            font-family: 'Syncopate', sans-serif;
        }
        .filter-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50px;
            background: radial-gradient(circle at center, rgba(43, 166, 72, 0.2), transparent 70%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .filter-btn:hover {
            border-color: rgba(43, 166, 72, 0.5);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(43, 166, 72, 0.15);
        }
        .filter-btn:hover::before { opacity: 1; }
        .filter-btn.active {
            background: linear-gradient(135deg, #2BA648, #1a7a33);
            color: #000;
            border-color: #2BA648;
            font-weight: 700;
            box-shadow: 0 0 25px rgba(43, 166, 72, 0.3), inset 0 0 15px rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }
        .filter-btn.active::before { opacity: 0; }

        /* ============================================
           TEAM CONTAINER & GRID
           ============================================ */
        .team-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 2rem 6rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }
        .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            perspective: 1200px;
        }

        /* ============================================
           TEAM CARDS — GLASSMORPHISM
           ============================================ */
        .team-card-wrapper {
            background-color: transparent;
            width: 100%;
            height: 380px;
            perspective: 1200px;
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
        }
        .card-inner {
            position: relative;
            width: 100%; height: 100%;
            text-align: center;
            transition: transform 0.9s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            transform-style: preserve-3d;
        }
        .team-card-wrapper.flipped .card-inner { transform: rotateY(180deg); }

        .card-front, .card-back {
            position: absolute;
            width: 100%; height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: linear-gradient(145deg, rgba(15, 15, 15, 0.9), rgba(5, 5, 5, 0.95));
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            overflow: hidden;
            transition: border-color 0.4s ease, box-shadow 0.4s ease;
        }

        /* Green radial fill from avatar on hover */
        .card-front::before {
            content: '';
            position: absolute;
            top: 28%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(43, 166, 72, 0.18) 0%, rgba(43, 166, 72, 0.08) 40%, transparent 70%);
            transform: translate(-50%, -50%);
            transition: width 0.7s cubic-bezier(0.4, 0, 0.2, 1), height 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 0;
            pointer-events: none;
        }
        .team-card-wrapper:hover .card-front::before {
            width: 250%;
            height: 250%;
        }

        .team-card-wrapper:hover .card-front {
            border-color: rgba(43, 166, 72, 0.3);
            box-shadow: 0 15px 50px rgba(43, 166, 72, 0.12), 0 5px 20px rgba(0, 0, 0, 0.5);
        }

        /* Avatar */
        .card-avatar {
            width: 100px; height: 100px;
            border-radius: 50%;
            margin-bottom: 1.4rem;
            object-fit: cover;
            background: linear-gradient(135deg, rgba(43, 166, 72, 0.05), rgba(255, 255, 255, 0.02));
            border: 2px solid rgba(255, 255, 255, 0.08);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            z-index: 1;
        }
        .team-card-wrapper:hover .card-avatar {
            border-color: rgba(43, 166, 72, 0.6);
            box-shadow: 0 0 25px rgba(43, 166, 72, 0.2);
            transform: scale(1.05);
        }

        /* Name & Role */
        .card-front h2 {
            font-family: 'Syncopate', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 0.6rem;
            line-height: 1.3;
            letter-spacing: 0.05em;
            transition: text-shadow 0.4s ease;
        }
        .team-card-wrapper:hover .card-front h2 {
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .card-role {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-family: 'Host Grotesk', sans-serif;
            color: #2BA648;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            background: rgba(43, 166, 72, 0.08);
            border: 1px solid rgba(43, 166, 72, 0.15);
        }
        .role-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #2BA648;
            animation: pulse-dot 2s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(43, 166, 72, 0.7); }
            50% { opacity: 0.6; box-shadow: 0 0 0 6px rgba(43, 166, 72, 0); }
        }

        /* Card Back */
        .card-back {
            transform: rotateY(180deg);
            background: linear-gradient(145deg, rgba(15, 28, 18, 0.95), rgba(5, 10, 5, 0.98));
            border-color: rgba(43, 166, 72, 0.2);
            justify-content: center;
            gap: 0.5rem;
        }
        .card-back-name {
            font-family: 'Syncopate', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: #2BA648;
            text-shadow: 0 0 10px rgba(43, 166, 72, 0.3);
        }

        /* Social Links */
        .social-links {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            width: 100%;
            max-width: 220px;
        }
        .social-links a {
            font-family: 'Host Grotesk', sans-serif;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            padding: 0.75rem 1rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.7rem;
            background: rgba(255, 255, 255, 0.02);
            position: relative;
            overflow: hidden;
        }
        .social-links a::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(43, 166, 72, 0.15), transparent);
            opacity: 0;
            transition: opacity 0.35s ease;
        }
        .social-links a:hover::before { opacity: 1; }
        .social-links a svg {
            transition: all 0.35s ease;
            flex-shrink: 0;
        }
        .social-links a:hover {
            border-color: rgba(43, 166, 72, 0.5);
            color: #2BA648;
            transform: translateX(5px);
            box-shadow: 0 4px 15px rgba(43, 166, 72, 0.15);
        }
        .social-links a:hover svg {
            transform: scale(1.2);
            filter: drop-shadow(0 0 5px rgba(43, 166, 72, 0.5));
        }

        /* ============================================
           PROJECT CSS (kept for Barba transitions)
           ============================================ */
        .reel-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 10; }
        .project-item { position: absolute; top: 0; left: 0; width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; will-change: transform; }
        .project-content { width: 100%; max-width: 1600px; padding: 0 4rem; display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 2rem; align-items: center; }
        .project-counter { font-family: 'Syncopate', sans-serif; font-size: clamp(4rem, 10vw, 12rem); line-height: 0.8; letter-spacing: -0.05em; color: transparent; -webkit-text-stroke: 1px rgba(255, 255, 255, 0.2); transition: all 0.5s ease; }
        .project-counter span { font-size: 2rem; -webkit-text-stroke: 0; color: rgba(255, 255, 255, 0.3); }
        .is-active .project-counter { color: #2BA648; -webkit-text-stroke: 0; }
        .project-image-wrap { display: block; position: relative; width: 100%; height: 60vh; overflow: hidden; border-radius: 4px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); cursor: pointer; transition: transform 0.5s ease, box-shadow 0.5s ease; }
        .project-image-wrap:hover { transform: scale(1.02); box-shadow: 0 30px 60px rgba(43, 166, 72, 0.15); }
        .project-image-wrap::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, transparent, rgba(15, 57, 24, 0.2)); pointer-events: none; mix-blend-mode: multiply; }
        .project-image { position: absolute; top: -20%; left: 0; width: 100%; height: 140%; object-fit: cover; will-change: transform; filter: grayscale(80%) contrast(1.2); transition: filter 0.8s ease; }
        .is-active .project-image { filter: grayscale(0%) contrast(1); }
        .project-info { text-align: right; }
        .project-title { font-family: 'Syncopate', sans-serif; font-size: clamp(1.5rem, 3vw, 2.5rem); font-weight: 700; margin-bottom: 1rem; line-height: 1.1; }
        .project-title a { text-decoration: none; color: inherit; transition: color 0.3s ease; }
        .project-title a:hover { color: #2BA648; }
        .project-desc { font-family: 'Host Grotesk', sans-serif; font-size: 0.9rem; color: #94a3b8; max-width: 300px; margin-left: auto; }

        @media (max-width: 1024px) {
            .project-content { display: flex; flex-direction: column; padding: 0 1.5rem; justify-content: center; height: 100%; }
            .project-counter { position: relative; top: auto; left: auto; font-size: clamp(3.5rem, 12vw, 5rem); text-align: left; width: 100%; max-width: 500px; margin: 0 auto 0.5rem auto; order: 1; z-index: 2; opacity: 1; line-height: 1; }
            .project-counter span { font-size: 1.5rem; }
            .project-image-wrap { height: 40vh; width: 100%; max-width: 500px; margin: 0 auto; order: 2; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
            .project-info { text-align: left; width: 100%; max-width: 500px; margin: 1.5rem auto 0 auto; order: 3; }
            .project-desc { margin: 0; max-width: 100%; }
            .project-title { font-size: clamp(1.5rem, 6vw, 2rem); margin-bottom: 0.5rem; }
        }

        /* ============================================
           ANTI-FLASH
           ============================================ */
        .project-counter, .project-image-wrap, .project-title, .project-desc,
        .team-card-wrapper {
            opacity: 0; visibility: hidden;
        }

        /* ============================================
           BARBA TRANSITIONS
           ============================================ */
        .page-transition {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 9999; pointer-events: none; display: flex;
        }
        .transition-panel {
            flex: 1; height: 100%;
            background-color: #2BA648;
            transform: translateY(100%);
            will-change: transform;
        }

        /* ============================================
           MOBILE RESPONSIVE + PERFORMANCE
           ============================================ */

        /* Tablets */
        @media (max-width: 900px) {
            .team-grid { grid-template-columns: repeat(2, 1fr); gap: 1.25rem; }
            .team-card-wrapper { height: 340px; }
            .team-container { padding: 1.5rem 1.25rem 4rem 1.25rem; }
        }

        /* Mobile */
        @media (max-width: 640px) {
            /* Performance: disable expensive effects on mobile */
            .card-front, .card-back {
                backdrop-filter: none;
                -webkit-backdrop-filter: none;
                background: linear-gradient(145deg, rgba(18, 18, 18, 0.98), rgba(8, 8, 8, 0.99));
            }
            .breathing-gradient { display: none; }
            .blueprint-bg { opacity: 0.3; }

            /* Layout */
            .team-hero { min-height: 30vh; padding-top: 5rem; }
            .hero-title { letter-spacing: 0.08em; }
            .hero-subtitle { font-size: 0.7rem; letter-spacing: 0.2em; margin-top: 1rem; }
            .hero-line { margin-top: 1rem; }

            .team-container { padding: 1rem 0.75rem 3rem 0.75rem; }
            .team-grid { grid-template-columns: repeat(2, 1fr); gap: 0.6rem; }
            .team-card-wrapper { height: 260px; }

            .card-front, .card-back { padding: 0.8rem; border-radius: 12px; }
            .card-avatar { width: 75px; height: 75px; margin-bottom: 0.6rem; }
            .card-front h2 { font-size: 0.7rem; margin-bottom: 0.4rem; }
            .card-role { font-size: 0.55rem; padding: 0.2rem 0.5rem; letter-spacing: 1px; gap: 0.3rem; }
            .role-dot { width: 4px; height: 4px; }

            .card-back-name { font-size: 0.7rem; margin-bottom: 0.3rem; }
            .social-links { gap: 0.4rem; }
            .social-links a { padding: 0.45rem 0.5rem; font-size: 0.6rem; gap: 0.3rem; border-radius: 8px; letter-spacing: 1px; }
            .social-links a svg { width: 13px; height: 13px; }

            .filters-wrapper { gap: 0.4rem; margin-bottom: 1.5rem; }
            .filter-btn { padding: 0.35rem 0.8rem; font-size: 0.6rem; }

            /* Disable hover effects on touch (they stay stuck) */
            .card-front::before { display: none; }
            .team-card-wrapper:hover .card-front { border-color: rgba(255, 255, 255, 0.06); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6); }
            .team-card-wrapper:hover .card-avatar { transform: none; border-color: rgba(255, 255, 255, 0.08); box-shadow: none; }

            nav { padding: 1.2rem; }
            .nav-items { gap: 0.8rem; font-size: 0.75rem; }
        }

        /* Very small phones */
        @media (max-width: 360px) {
            .team-card-wrapper { height: 230px; }
            .card-avatar { width: 60px; height: 60px; margin-bottom: 0.4rem; }
            .card-front h2 { font-size: 0.6rem; }
            .card-role { font-size: 0.5rem; }
            .social-links a { padding: 0.35rem; font-size: 0.55rem; }
            .hero-title { font-size: 2.2rem; }
        }

        /* ============================================
           FOOTER SECTION
           ============================================ */
        :root {
            --base-orbit: #000000;
            --accent-glow: #2BA648;
        }
        .reactor-zone h1 {
            font-weight: 300;
            font-size: clamp(3rem, 5vw, 6rem);
            margin: 0; line-height: 1;
            letter-spacing: -0.02em;
        }
        .reactor-zone h3 {
            font-weight: 400;

    <script>
        // =============================================
        // HERO ANIMATIONS
        // =============================================
        function animateHero(delay = 0) {
            const titleEl = document.getElementById('heroTitle');
            if (!titleEl) return;
            const text = "OUR TEAM";
            titleEl.innerHTML = '';
            text.split('').forEach((char, i) => {
                const span = document.createElement('span');
                span.className = 'letter';
                span.textContent = char === ' ' ? '\u00A0' : char;
                titleEl.appendChild(span);
            });

            const letters = titleEl.querySelectorAll('.letter');
            gsap.to(letters, {
                opacity: 1, y: 0, duration: 0.6, stagger: 0.06, ease: "power4.out",
                delay: delay + 0.2,
                onComplete: () => {
                    letters.forEach((l, i) => {
                        setTimeout(() => l.classList.add('revealed'), i * 80);
                    });
                }
            });

            gsap.to('#heroSubtitle', { opacity: 1, y: 0, duration: 0.8, ease: "power3.out", delay: delay + 0.8 });
            gsap.to('#heroLine', { opacity: 1, scaleX: 1, duration: 0.6, ease: "power2.out", delay: delay + 1 });

            gsap.to('.circuit-line', { strokeDashoffset: 0, duration: 2.5, stagger: 0.15, ease: "power1.inOut", delay: delay + 0.3 });
            gsap.to('.circuit-dot', { opacity: 1, duration: 0.4, stagger: 0.08, ease: "power2.out", delay: delay + 1.2 });
            gsap.to('.circuit-dot', {
                r: 6, opacity: 0.5, duration: 1.5,
                stagger: { each: 0.2, repeat: -1, yoyo: true },
                ease: "sine.inOut", delay: delay + 2
            });
        }

        // =============================================
        // SHARED GLOBALS & DATA
        // =============================================
        let projectsData = [];
        let teamData = [];
        let reelTicker, boundResize, boundWheel, boundTouchStart, boundTouchMove;

        // --- TEAM LOGIC ---
        async function fetchTeam() {
            try {
                const response = await fetch('/api/team?t=' + new Date().getTime());
                if (!response.ok) throw new Error("Team API not found.");
                teamData = await response.json();
            } catch (e) {
                console.error("Failed to load team data:", e);
                teamData = [
                    { name: "Saswat Mohanty", role: "Apex", year: "2028", insta: "#", linkedin: "#", github: "#", img: "" }
                ];
            }
        }

        function renderTeam(filterValue, delay = 0) {
            const grid = document.getElementById('team-grid');
            if (!grid) return;
            // Kill existing ScrollTrigger instances for cards before re-rendering
            ScrollTrigger.getAll().forEach(st => st.kill());
            grid.innerHTML = '';
            const filteredData = filterValue === 'all' ? teamData : teamData.filter(member => member.year === filterValue);

            filteredData.forEach((member, index) => {
                const avatarHtml = member.img
                    ? `<img src="${encodeURI(member.img)}" alt="${member.name}" class="card-avatar" loading="lazy">`
                    : `<div class="card-avatar"></div>`;

                const card = document.createElement('div');
                card.className = 'team-card-wrapper';
                card.innerHTML = `
                    <div class="card-inner" onclick="this.parentElement.classList.toggle('flipped')">
                        <div class="card-front">
                            ${avatarHtml}
                            <h2>${member.name}</h2>
                            <div class="card-role">
                                <span class="role-dot"></span>
                                ${member.year === 'alumni' ? 'Alumni' : 'Class of ' + member.year}
                            </div>
                        </div>
                        <div class="card-back">
                            <div class="card-back-name">${member.name}</div>
                            <div class="social-links">
                                <a href="${member.insta || '#'}" target="_blank" onclick="event.stopPropagation()">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
                                    Instagram
                                </a>
                                <a href="${member.linkedin || '#'}" target="_blank" onclick="event.stopPropagation()">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path><rect x="2" y="9" width="4" height="12"></rect><circle cx="4" cy="4" r="2"></circle></svg>
                                    LinkedIn
                                </a>
                                <a href="${member.github || '#'}" target="_blank" onclick="event.stopPropagation()">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
                                    GitHub
                                </a>
                            </div>
                        </div>
                    </div>`;
                grid.appendChild(card);
            });

            const isMobile = window.innerWidth <= 640;

            // Set initial state immediately so cards are hidden but don't leave blank space
            gsap.set(".team-card-wrapper", {
                autoAlpha: 0,
                y: isMobile ? 30 : 60,
                rotateX: isMobile ? 0 : 15,
                scale: isMobile ? 1 : 0.9,
                transformOrigin: "bottom center"
            });

            // Use ScrollTrigger so cards only animate when the grid is in view
            ScrollTrigger.batch(".team-card-wrapper", {
                start: "top 90%",
                onEnter: (batch) => {
                    gsap.to(batch, {
                        autoAlpha: 1, y: 0, rotateX: 0, scale: 1,
                        duration: isMobile ? 0.4 : 0.7,
                        ease: "power4.out",
                        stagger: { each: isMobile ? 0.03 : 0.06 },
                        delay: delay,
                        overwrite: true
                    });
                },
                once: true
            });
        }

        function initFilters() {
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => {
                btn.onclick = (e) => {
                    buttons.forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    gsap.to(".team-card-wrapper", {
                        autoAlpha: 0, y: -30, rotateX: -10, scale: 0.95, duration: 0.3, stagger: 0.02, ease: "power2.in",
                        onComplete: () => renderTeam(e.target.getAttribute('data-filter'), 0)
                    });
                };
            });
        }

        // --- PROJECTS LOGIC ---
        async function fetchProjects() {
            try {
                const response = await fetch('/api/projects?t=' + new Date().getTime());
                if (!response.ok) throw new Error("API not found.");
                projectsData = await response.json();
            } catch (e) {
                projectsData = [
                    { title: "eNIGGmA", desc: "2 things you maybe wanna ride", img: "./project-assets/03ebb93dc76d5da51b66fa1826d3c548.jpg", link: "https://www.instagram.com/iamsazwat/?hl=en" }
                ];
            }
        }

        function cleanupProjectReel() {
            window.removeEventListener('resize', boundResize);
            window.removeEventListener('wheel', boundWheel);
            window.removeEventListener('touchstart', boundTouchStart);
            window.removeEventListener('touchmove', boundTouchMove);
            if (reelTicker) gsap.ticker.remove(reelTicker);
        }

        function initProjectReel(delay = 0) {
            cleanupProjectReel();
            const container = document.querySelector('.reel-container');
            if (!container) return;
            container.innerHTML = '';

            const totalProjects = String(projectsData.length).padStart(2, '0');

            projectsData.forEach((proj, i) => {
                const currentId = String(i + 1).padStart(2, '0');
                const projectLink = proj.link || '#';
                const item = document.createElement('div');
                item.className = 'project-item';
                item.innerHTML = `
                    <div class="project-content">
                        <div class="project-counter">${currentId}<span>/${totalProjects}</span></div>
                        <a href="${projectLink}" target="_blank" class="project-image-wrap">
                            <img src="${proj.img}" class="project-image" alt="${proj.title}" loading="lazy" decoding="async">
                        </a>
                        <div class="project-info">
                            <h2 class="project-title"><a href="${projectLink}" target="_blank">${proj.title}</a></h2>
                            <p class="project-desc">${proj.desc}</p>
                        </div>
                    </div>`;
                container.appendChild(item);
            });

            const items = document.querySelectorAll('.project-item');
            let windowHeight = window.innerHeight;
            let totalHeight = items.length * windowHeight;
            let y = 0, targetY = 0, touchStartY = 0;

            boundResize = () => { windowHeight = window.innerHeight; totalHeight = items.length * windowHeight; };
            boundWheel = (e) => { targetY -= e.deltaY * 1.5; };
            boundTouchStart = (e) => { touchStartY = e.touches[0].clientY; };
            boundTouchMove = (e) => { const touchY = e.touches[0].clientY; targetY -= (touchStartY - touchY) * 2.5; touchStartY = touchY; };

            window.addEventListener('resize', boundResize);
            window.addEventListener('wheel', boundWheel);
            window.addEventListener('touchstart', boundTouchStart, { passive: true });
            window.addEventListener('touchmove', boundTouchMove, { passive: true });

            reelTicker = () => {
                y += (targetY - y) * 0.08;
                items.forEach((item, i) => {
                    let offset = (i * windowHeight) + y;
                    let wrapped = gsap.utils.wrap(-windowHeight, totalHeight - windowHeight, offset);
                    gsap.set(item, { y: wrapped });
                    let normalized = wrapped / windowHeight;
                    gsap.set(item.querySelector('.project-image'), { y: normalized * 20 + "%" });

                    const distFromCenter = Math.abs(normalized);
                    if (distFromCenter < 0.3) { item.classList.add('is-active'); } else { item.classList.remove('is-active'); }
                    gsap.set(item.querySelector('.project-content'), { opacity: 1 - (distFromCenter * 0.6), scale: 1 - (distFromCenter * 0.1) });
                });
            };
            gsap.ticker.add(reelTicker);

            gsap.fromTo('.project-counter', { autoAlpha: 0, x: -50 }, { autoAlpha: 1, x: 0, duration: 0.4, ease: 'power4.out', delay: delay });
            gsap.fromTo('.project-image-wrap', { scale: 0.8, filter: 'blur(10px)', autoAlpha: 0 }, { scale: 1, filter: 'blur(0px)', autoAlpha: 1, duration: 1.2, ease: 'power3.out', delay: delay + 0.1 });
            gsap.fromTo(['.project-title', '.project-desc'], { autoAlpha: 0, y: 30 }, { autoAlpha: 1, y: 0, duration: 0.8, ease: 'power3.out', stagger: 0.1, delay: delay + 0.2 });
        }

        // =============================================
        // BARBA CORE
        // =============================================
        function initBarba() {
            if (window.barbaInitialized) return;
            window.barbaInitialized = true;

            gsap.registerPlugin(ScrollTrigger);

            barba.init({
                timeout: 5000,
                prevent: ({ el }) => el.hasAttribute('data-barba-prevent') || el.getAttribute('href') === '#',
                transitions: [{
                    name: 'fast-panel-wipe',
                    leave(data) {
                        const done = this.async();
                        gsap.to('.transition-panel', { y: '0%', duration: 0.3, stagger: 0.04, ease: 'power2.inOut', onComplete: done });
                    },
                    enter(data) {
                        const done = this.async();
                        window.scrollTo(0, 0);

                        if (data.current.container) {
                            data.current.container.style.display = 'none';
                        }

                        const loader = document.getElementById('loading-screen');
                        if (loader) loader.style.display = 'none';

                        gsap.to('.transition-panel', {
                            y: '-100%', duration: 0.3, stagger: 0.04, ease: 'power2.inOut', onComplete: () => {
                                gsap.set('.transition-panel', { y: '100%' }); done();
                            }
                        });
                    }
                }],
                views: [
                    {
                        namespace: 'projects',
                        beforeEnter(data) {
                            document.body.style.overflow = 'hidden';
                            document.body.style.touchAction = 'none';
                            const delay = (data.current && data.current.namespace) ? 0.35 : 0;
                            fetchProjects().then(() => initProjectReel(delay));
                        },
                        beforeLeave() { cleanupProjectReel(); }
                    },
                    {
                        namespace: 'team',
                        beforeEnter(data) {
                            document.body.style.overflowY = 'auto';
                            document.body.style.touchAction = 'auto';
                            const delay = (data.current && data.current.namespace) ? 0.35 : 0;

                            animateHero(delay);

                            fetchTeam().then(() => {
                                renderTeam('all', delay + 0.6);
                                initFilters();
                            });
                        }
                    }
                ]
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            const loader = document.getElementById('loading-screen');
            if (loader) { gsap.to(loader, { opacity: 0, duration: 0.5, delay: 0.2, onComplete: () => loader.style.display = 'none' }); }
            initBarba();
        });
    </script>

    <script>
        // =============================================
        // FOOTER CRYSTAL 3D SCENE
        // =============================================
        (function initFooterCrystal() {
            const footerContainerEl = document.getElementById('footer-canvas');
            if (!footerContainerEl) return;

            const footerScene = new THREE.Scene();
            footerScene.fog = new THREE.FogExp2(0x000000, 0.1);

            const footerCamera = new THREE.PerspectiveCamera(75, footerContainerEl.offsetWidth / footerContainerEl.offsetHeight, 0.1, 1000);
            footerCamera.position.set(0, 0, 5);
            const footerRenderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            footerRenderer.setSize(footerContainerEl.offsetWidth, footerContainerEl.offsetHeight);
            footerRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            footerRenderer.toneMapping = THREE.ReinhardToneMapping;
            footerContainerEl.appendChild(footerRenderer.domElement);

            footerScene.add(new THREE.AmbientLight(0x000000));

            const pointLight = new THREE.PointLight(0x2BA648, 5, 50);
            pointLight.position.set(0, 0, 0);
            footerScene.add(pointLight);

            const rimLight = new THREE.DirectionalLight(0x185D28, 4);
            rimLight.position.set(5, 5, 5);
            footerScene.add(rimLight);

            const crystalGroup = new THREE.Group();
            footerScene.add(crystalGroup);

            const innerCrystal = new THREE.Mesh(
                new THREE.OctahedronGeometry(1.2, 0),
                new THREE.MeshStandardMaterial({
                    color: 0x2BA648,
                    emissive: 0x0F3918,
                    emissiveIntensity: 1,
                    roughness: 0.1,
                    metalness: 0.8
                })
            );
            crystalGroup.add(innerCrystal);

            const outerCage = new THREE.Mesh(
                new THREE.IcosahedronGeometry(1.6, 0),
                new THREE.MeshStandardMaterial({
                    color: 0xffffff,
                    wireframe: true,
                    transparent: true,
                    opacity: 0.25
                })
            );
            crystalGroup.add(outerCage);

            const particlesGeo = new THREE.BufferGeometry();
            const posArray = new Float32Array(800 * 3);
            for (let i = 0; i < 800 * 3; i++) posArray[i] = (Math.random() - 0.5) * 12;
            particlesGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            const particles = new THREE.Points(
                particlesGeo,
                new THREE.PointsMaterial({ size: 0.015, color: 0x2BA648, transparent: true, opacity: 0.6 })
            );
            crystalGroup.add(particles);

            const footerMouse = { x: 0, y: 0 };
            document.querySelector('footer').addEventListener('mousemove', (e) => {
                footerMouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                footerMouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            });

            const footerContentContainer = document.querySelector('.footer-container');
            gsap.set(footerContentContainer, { yPercent: -50 });
            let scrollProgress = 0;

            ScrollTrigger.create({
                trigger: 'footer', start: 'top bottom', end: 'bottom bottom', scrub: true,
                onUpdate: (self) => {
                    scrollProgress = self.progress;
                    gsap.set(footerContentContainer, { yPercent: -50 * (1 - scrollProgress) });
                }
            });

            window.addEventListener('resize', () => {
                footerCamera.aspect = footerContainerEl.offsetWidth / footerContainerEl.offsetHeight;
                footerCamera.updateProjectionMatrix();
                footerRenderer.setSize(footerContainerEl.offsetWidth, footerContainerEl.offsetHeight);
            });

            function animateFooter() {
                requestAnimationFrame(animateFooter);
                const time = performance.now() * 0.001;

                innerCrystal.rotation.y += 0.01;
                innerCrystal.rotation.x += 0.005;
                outerCage.rotation.y -= 0.005;
                outerCage.rotation.z += 0.002;
                particles.rotation.y += 0.001;

                const scale = 1 + Math.sin(time * 2) * 0.05;
                innerCrystal.scale.set(scale, scale, scale);

                const targetZ = -5 + (scrollProgress * 5);
                crystalGroup.position.z += (targetZ - crystalGroup.position.z) * 0.05;
                crystalGroup.rotation.x += (footerMouse.y * 0.2 - crystalGroup.rotation.x) * 0.05;
                crystalGroup.rotation.y += (footerMouse.x * 0.2 - crystalGroup.rotation.y) * 0.05;

                footerRenderer.render(footerScene, footerCamera);
            }
            animateFooter();
        })();
    </script>
