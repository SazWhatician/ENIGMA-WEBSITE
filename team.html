<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ENIGMA | Team</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Host+Grotesk:ital,wght@0,300..800;1,300..800&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://unpkg.com/@barba/core"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        void: '#000000', orbitGreen: '#2BA648', orbitDark: '#0F3918',
                    },
                    fontFamily: {
                        sans: ['"Host Grotesk"', 'sans-serif'], syncopate: ['"Syncopate"', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        /* --- UNIFIED CSS FOR BOTH PAGES --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; color: #fff; min-height: 100vh; overflow-x: hidden; }

        .blueprint-bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; display: flex; justify-content: center; align-items: center; }
        .bp-circle { position: absolute; width: 90vmin; height: 90vmin; border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 50%; }
        .bp-line-h { position: absolute; width: 100vw; height: 1px; background: rgba(255, 255, 255, 0.05); }
        .bp-line-v { position: absolute; width: 1px; height: 100vh; background: rgba(255, 255, 255, 0.05); }
        .bp-line-d1 { position: absolute; width: 150vw; height: 1px; background: rgba(255, 255, 255, 0.03); transform: rotate(30deg); }
        .bp-line-d2 { position: absolute; width: 150vw; height: 1px; background: rgba(255, 255, 255, 0.03); transform: rotate(-30deg); }

        nav { position: fixed; top: 0; left: 0; width: 100vw; padding: 2rem; display: flex; justify-content: space-between; align-items: center; z-index: 100; mix-blend-mode: difference; }
        nav, .logo p { font-weight: 700; font-size: 0.9rem; font-family: "Host Grotesk", sans-serif;}
        .logo a { text-decoration: none; color: white; }
        .nav-items { display: flex; gap: 2rem; }
        .nav-items a { text-decoration: none; color: white; transition: color 0.3s; }
        .nav-items a:hover { color: #2BA648; }
        @media(max-width: 768px){ nav { padding: 1.5rem; } .nav-items { gap: 1rem; font-size: 0.8rem; } }

        /* --- PROJECT CSS --- */
        .reel-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 10; }
        .project-item { position: absolute; top: 0; left: 0; width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; will-change: transform; }
        .project-content { width: 100%; max-width: 1600px; padding: 0 4rem; display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 2rem; align-items: center; }
        .project-counter { font-family: 'Syncopate', sans-serif; font-size: clamp(4rem, 10vw, 12rem); line-height: 0.8; letter-spacing: -0.05em; color: transparent; -webkit-text-stroke: 1px rgba(255, 255, 255, 0.2); transition: all 0.5s ease; }
        .project-counter span { font-size: 2rem; -webkit-text-stroke: 0; color: rgba(255, 255, 255, 0.3); }
        .is-active .project-counter { color: #2BA648; -webkit-text-stroke: 0; }
        .project-image-wrap { display: block; position: relative; width: 100%; height: 60vh; overflow: hidden; border-radius: 4px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); cursor: pointer; transition: transform 0.5s ease, box-shadow 0.5s ease; }
        .project-image-wrap:hover { transform: scale(1.02); box-shadow: 0 30px 60px rgba(43, 166, 72, 0.15); }
        .project-image-wrap::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, transparent, rgba(15, 57, 24, 0.2)); pointer-events: none; mix-blend-mode: multiply; }
        .project-image { position: absolute; top: -20%; left: 0; width: 100%; height: 140%; object-fit: cover; will-change: transform; filter: grayscale(80%) contrast(1.2); transition: filter 0.8s ease; }
        .is-active .project-image { filter: grayscale(0%) contrast(1); }
        .project-info { text-align: right; }
        .project-title { font-family: 'Syncopate', sans-serif; font-size: clamp(1.5rem, 3vw, 2.5rem); font-weight: 700; margin-bottom: 1rem; line-height: 1.1; }
        .project-title a { text-decoration: none; color: inherit; transition: color 0.3s ease; }
        .project-title a:hover { color: #2BA648; }
        .project-desc { font-family: 'Host Grotesk', sans-serif; font-size: 0.9rem; color: #94a3b8; max-width: 300px; margin-left: auto; }

        @media (max-width: 1024px) {
            .project-content { display: flex; flex-direction: column; padding: 0 1.5rem; justify-content: center; height: 100%; }
            .project-counter { position: relative; top: auto; left: auto; font-size: clamp(3.5rem, 12vw, 5rem); text-align: left; width: 100%; max-width: 500px; margin: 0 auto 0.5rem auto; order: 1; z-index: 2; opacity: 1; line-height: 1; }
            .project-counter span { font-size: 1.5rem; }
            .project-image-wrap { height: 40vh; width: 100%; max-width: 500px; margin: 0 auto; order: 2; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
            .project-info { text-align: left; width: 100%; max-width: 500px; margin: 1.5rem auto 0 auto; order: 3; }
            .project-desc { margin: 0; max-width: 100%; }
            .project-title { font-size: clamp(1.5rem, 6vw, 2rem); margin-bottom: 0.5rem; }
        }

        /* --- TEAM CSS --- */
        .team-container { position: relative; z-index: 10; width: 100%; max-width: 1400px; margin: 0 auto; padding: 8rem 2rem 4rem 2rem; display: flex; flex-direction: column; gap: 3rem; }
        .filters-wrapper { display: flex; justify-content: center; flex-wrap: wrap; gap: 1.5rem; margin-bottom: 2rem; font-family: 'Syncopate', sans-serif; }
        .filter-btn { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.6); padding: 0.5rem 1.5rem; font-size: 0.8rem; border-radius: 50px; cursor: pointer; transition: all 0.3s ease; text-transform: uppercase; }
        .filter-btn:hover { border-color: #2BA648; color: #fff; }
        .filter-btn.active { background: #2BA648; color: #000; border-color: #2BA648; font-weight: 700; }
        .team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 2rem; perspective: 1000px; }
        .team-card-wrapper { background-color: transparent; width: 100%; height: 350px; perspective: 1000px; cursor: pointer; }
        .card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.8s cubic-bezier(0.4, 0.0, 0.2, 1); transform-style: preserve-3d; }
        .team-card-wrapper.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; -webkit-backface-visibility: hidden; backface-visibility: hidden; border-radius: 8px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 2rem; border: 1px solid rgba(255, 255, 255, 0.1); background: linear-gradient(145deg, #0a0a0a, #050505); box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .team-card-wrapper:hover .card-front { border-color: rgba(43, 166, 72, 0.3); box-shadow: 0 10px 40px rgba(43, 166, 72, 0.1); }
        .card-front h2 { font-family: 'Syncopate', sans-serif; font-size: 1.2rem; font-weight: 700; margin-bottom: 0.5rem; line-height: 1.2; }
        .card-front p { font-family: 'Host Grotesk', sans-serif; color: #2BA648; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; }
        .card-back { transform: rotateY(180deg); background: linear-gradient(145deg, #0f1c12, #050505); border-color: rgba(43, 166, 72, 0.2); }
        
        /* SOCIAL LINKS CSS ENHANCED */
        .social-links { display: flex; flex-direction: column; gap: 1rem; width: 100%; }
        .social-links a { 
            font-family: 'Host Grotesk', sans-serif; 
            color: white; 
            text-decoration: none; 
            padding: 0.8rem; 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 4px; 
            transition: all 0.3s ease; 
            font-size: 0.85rem; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            display: flex; /* Flex alignment for SVGs */
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
        }
        .social-links a svg { transition: transform 0.3s ease; }
        .social-links a:hover { background: rgba(43, 166, 72, 0.1); border-color: #2BA648; color: #2BA648; }
        .social-links a:hover svg { transform: scale(1.15); }

        /* --- ANTI-FLASH CSS (Hides elements until GSAP animates them) --- */
        .project-counter, .project-image-wrap, .project-title, .project-desc, .team-card-wrapper { opacity: 0; visibility: hidden; }

        /* --- BARBA TRANSITIONS --- */
        .page-transition { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 9999; pointer-events: none; display: flex; }
        .transition-panel { flex: 1; height: 100%; background-color: #2BA648; transform: translateY(100%); will-change: transform; }

        /* --- MOBILE RESPONSIVENESS FOR TEAM GRID --- */
        @media (max-width: 640px) {
            .team-container {
                padding: 6rem 1rem 3rem 1rem; /* Reduce container padding to maximize screen space */
            }
            .team-grid { 
                grid-template-columns: repeat(2, 1fr); /* Force exactly 2 columns */
                gap: 0.75rem; /* Smaller gap between cards */
            }
            .team-card-wrapper { 
                height: 240px; /* Reduce height so they aren't oddly tall and narrow */
            }
            .card-front, .card-back { 
                padding: 0.75rem; /* Reduce inner padding to fit the smaller width */
            }
            .card-front h2 { 
                font-size: 0.9rem; /* Scale down name */
            }
            .card-front p { 
                font-size: 0.65rem; /* Scale down role/year */
                letter-spacing: 1px;
            }
            .social-links {
                gap: 0.5rem; /* Tighter spacing for buttons */
            }
            .social-links a {
                padding: 0.5rem;
                font-size: 0.65rem; /* Smaller button text */
                gap: 0.3rem;
            }
            .social-links a svg {
                width: 14px; /* Slightly smaller icons */
                height: 14px;
            }
        }
    </style>
</head>
<body data-barba="wrapper">

    <div class="page-transition">
        <div class="transition-panel"></div>
        <div class="transition-panel"></div>
        <div class="transition-panel"></div>
    </div>

    <div class="blueprint-bg">
        <div class="bp-circle"></div><div class="bp-line-h"></div><div class="bp-line-v"></div><div class="bp-line-d1"></div><div class="bp-line-d2"></div>
    </div>

    <div id="loading-screen" style="position: fixed; inset: 0; z-index: 50; display: flex; justify-content: center; align-items: center; background-color: #000; font-family: 'Syncopate', sans-serif; font-size: 2rem; color: #2BA648; flex-direction: column; gap: 1rem;">
        <p class="animate-pulse">LOADING...</p>
    </div>

    <main data-barba="container" data-barba-namespace="team">
        <nav>
            <div class="logo"><a href="index.html" data-barba-prevent>ENIGMA.</a></div>
            <div class="nav-items">
                <a href="#" data-barba-prevent>Events</a>
                <a href="project.html">Projects</a>
                <a href="team.html" class="text-orbitGreen">Team</a>
                <a href="#" data-barba-prevent>Contact</a>
            </div>
        </nav>
        
        <div class="team-container">
            <div class="filters-wrapper">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="2026">2026</button>
                <button class="filter-btn" data-filter="2027">2027</button>
                <button class="filter-btn" data-filter="2028">2028</button>
                <button class="filter-btn" data-filter="alumni">Alumni</button>
            </div>
            <div class="team-grid" id="team-grid"></div>
        </div>
    </main>

    <script>
        // --- SHARED GLOBALS & DATA ---
        let projectsData = [];
        let teamData = []; // NEW: Now it starts empty!
        let reelTicker, boundResize, boundWheel, boundTouchStart, boundTouchMove; 

        // --- TEAM LOGIC ---
        // NEW: Fetch Team Data from API
        async function fetchTeam() {
            try {
                const response = await fetch('/api/team?t=' + new Date().getTime());
                if(!response.ok) throw new Error("Team API not found.");
                teamData = await response.json();
            } catch(e) {
                console.error("Failed to load team data:", e);
                // Fallback just in case
                teamData = [
                    { name: "Saswat Mohanty", role: "Apex", year: "2028", insta: "#", linkedin: "#", github: "#" }
                ];
            }
        }

        function renderTeam(filterValue, delay = 0) {
            const grid = document.getElementById('team-grid');
            if(!grid) return;
            grid.innerHTML = ''; 
            const filteredData = filterValue === 'all' ? teamData : teamData.filter(member => member.year === filterValue);

            filteredData.forEach(member => {
                const card = document.createElement('div');
                card.className = `team-card-wrapper`;
                card.innerHTML = `
                    <div class="card-inner" onclick="this.parentElement.classList.toggle('flipped')">
                        <div class="card-front">
                            <h2>${member.name}</h2>
                            <p>${member.year === 'alumni' ? 'Alumni' : 'Class of ' + member.year}</p>
                        </div>
                        <div class="card-back">
                            <div class="social-links">
                                <a href="${member.insta}" target="_blank" onclick="event.stopPropagation()">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
                                    Instagram
                                </a>
                                <a href="${member.linkedin}" target="_blank" onclick="event.stopPropagation()">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path><rect x="2" y="9" width="4" height="12"></rect><circle cx="4" cy="4" r="2"></circle></svg>
                                    LinkedIn
                                </a>
                                <a href="${member.github}" target="_blank" onclick="event.stopPropagation()">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
                                    GitHub
                                </a>
                            </div>
                        </div>
                    </div>`;
                grid.appendChild(card);
            });
            // Auto-visible set by fromTo
            gsap.fromTo(".team-card-wrapper", { autoAlpha: 0, y: 40, scale: 0.95 }, { autoAlpha: 1, y: 0, scale: 1, duration: 0.6, ease: "power3.out", stagger: 0.05, delay: delay });
        }

        function initFilters() {
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => {
                btn.onclick = (e) => {
                    buttons.forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    gsap.to(".team-card-wrapper", {
                        autoAlpha: 0, y: -20, duration: 0.3, stagger: 0.02, ease: "power2.in",
                        onComplete: () => renderTeam(e.target.getAttribute('data-filter'), 0)
                    });
                };
            });
        }

        // --- PROJECTS LOGIC ---
        async function fetchProjects() {
            try {
                const response = await fetch('/api/projects?t=' + new Date().getTime());
                if(!response.ok) throw new Error("API not found.");
                projectsData = await response.json();
            } catch(e) {
                projectsData = [
                    { title: "eNIGGmA", desc: "2 things you maybe wanna ride", img: "./project-assets/03ebb93dc76d5da51b66fa1826d3c548.jpg", link: "https://www.instagram.com/iamsazwat/?hl=en" }
                ];
            }
        }

        function cleanupProjectReel() {
            window.removeEventListener('resize', boundResize); 
            window.removeEventListener('wheel', boundWheel); 
            window.removeEventListener('touchstart', boundTouchStart); 
            window.removeEventListener('touchmove', boundTouchMove);
            if(reelTicker) gsap.ticker.remove(reelTicker);
        }

        function initProjectReel(delay = 0) {
            cleanupProjectReel();
            const container = document.querySelector('.reel-container');
            if(!container) return; 
            container.innerHTML = ''; 
            
            const totalProjects = String(projectsData.length).padStart(2, '0');

            projectsData.forEach((proj, i) => {
                const currentId = String(i + 1).padStart(2, '0');
                const projectLink = proj.link || '#'; 
                const item = document.createElement('div');
                item.className = 'project-item';
                item.innerHTML = `
                    <div class="project-content">
                        <div class="project-counter">${currentId}<span>/${totalProjects}</span></div>
                        <a href="${projectLink}" target="_blank" class="project-image-wrap">
                            <img src="${proj.img}" class="project-image" alt="${proj.title}" loading="lazy" decoding="async">
                        </a>
                        <div class="project-info">
                            <h2 class="project-title"><a href="${projectLink}" target="_blank">${proj.title}</a></h2>
                            <p class="project-desc">${proj.desc}</p>
                        </div>
                    </div>`;
                container.appendChild(item);
            });

            const items = document.querySelectorAll('.project-item');
            let windowHeight = window.innerHeight; 
            let totalHeight = items.length * windowHeight;
            let y = 0, targetY = 0, touchStartY = 0;

            boundResize = () => { windowHeight = window.innerHeight; totalHeight = items.length * windowHeight; };
            boundWheel = (e) => { targetY -= e.deltaY * 1.5; };
            boundTouchStart = (e) => { touchStartY = e.touches[0].clientY; };
            boundTouchMove = (e) => { const touchY = e.touches[0].clientY; targetY -= (touchStartY - touchY) * 2.5; touchStartY = touchY; };

            window.addEventListener('resize', boundResize); 
            window.addEventListener('wheel', boundWheel);
            window.addEventListener('touchstart', boundTouchStart, { passive: true }); 
            window.addEventListener('touchmove', boundTouchMove, { passive: true });

            reelTicker = () => {
                y += (targetY - y) * 0.08;
                items.forEach((item, i) => {
                    let offset = (i * windowHeight) + y;
                    let wrapped = gsap.utils.wrap(-windowHeight, totalHeight - windowHeight, offset);
                    gsap.set(item, { y: wrapped });
                    let normalized = wrapped / windowHeight; 
                    gsap.set(item.querySelector('.project-image'), { y: normalized * 20 + "%" });
                    
                    const distFromCenter = Math.abs(normalized);
                    if(distFromCenter < 0.3) { item.classList.add('is-active'); } else { item.classList.remove('is-active'); }
                    gsap.set(item.querySelector('.project-content'), { opacity: 1 - (distFromCenter * 0.6), scale: 1 - (distFromCenter * 0.1) });
                });
            };
            gsap.ticker.add(reelTicker);

            gsap.fromTo('.project-counter', { autoAlpha: 0, x: -50 }, { autoAlpha: 1, x: 0, duration: 0.4, ease: 'power4.out', delay: delay });
            gsap.fromTo('.project-image-wrap', { scale: 0.8, filter: 'blur(10px)', autoAlpha: 0 }, { scale: 1, filter: 'blur(0px)', autoAlpha: 1, duration: 1.2, ease: 'power3.out', delay: delay + 0.1 });
            gsap.fromTo(['.project-title', '.project-desc'], { autoAlpha: 0, y: 30 }, { autoAlpha: 1, y: 0, duration: 0.8, ease: 'power3.out', stagger: 0.1, delay: delay + 0.2 });
        }

        // --- BARBA CORE ---
        function initBarba() {
            if(window.barbaInitialized) return;
            window.barbaInitialized = true;

            barba.init({
                timeout: 5000,
                prevent: ({ el }) => el.hasAttribute('data-barba-prevent') || el.getAttribute('href') === '#',
                transitions: [{
                    name: 'fast-panel-wipe',
                    leave(data) {
                        const done = this.async();
                        gsap.to('.transition-panel', { y: '0%', duration: 0.3, stagger: 0.04, ease: 'power2.inOut', onComplete: done });
                    },
                    enter(data) {
                        const done = this.async();
                        window.scrollTo(0, 0);
                        
                        // INSTANTLY HIDE THE OLD PAGE TO PREVENT OVERLAP
                        if(data.current.container) {
                            data.current.container.style.display = 'none';
                        }

                        const loader = document.getElementById('loading-screen');
                        if(loader) loader.style.display = 'none';
                        
                        gsap.to('.transition-panel', { y: '-100%', duration: 0.3, stagger: 0.04, ease: 'power2.inOut', onComplete: () => { 
                            gsap.set('.transition-panel', { y: '100%' }); done(); 
                        }});
                    }
                }],
                views: [
                    {
                        namespace: 'projects',
                        beforeEnter(data) {
                            document.body.style.overflow = 'hidden';
                            document.body.style.touchAction = 'none';
                            // IF THIS IS A TRANSITION, WAIT 0.35s FOR WIPE TO FINISH BEFORE ANIMATING
                            const delay = (data.current && data.current.namespace) ? 0.35 : 0;
                            fetchProjects().then(() => initProjectReel(delay));
                        },
                        beforeLeave() { cleanupProjectReel(); }
                    },
                    {
                        namespace: 'team',
                        beforeEnter(data) {
                            document.body.style.overflowY = 'auto';
                            document.body.style.touchAction = 'auto';
                            const delay = (data.current && data.current.namespace) ? 0.35 : 0;
                            
                            // NEW: Wait for fetchTeam before rendering
                            fetchTeam().then(() => {
                                renderTeam('all', delay);
                                initFilters();
                            });
                        }
                    }
                ]
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            const loader = document.getElementById('loading-screen');
            if(loader) { gsap.to(loader, { opacity: 0, duration: 0.5, delay: 0.2, onComplete: () => loader.style.display = 'none' }); }
            initBarba();
        });
    </script>
</body>
</html>
