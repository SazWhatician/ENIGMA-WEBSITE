<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ENIGMA | Events</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Host+Grotesk:ital,wght@0,300..800;1,300..800&family=Syncopate:wght@400;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/lenis@1.0.45/dist/lenis.min.js"></script>
    <script src="https://unpkg.com/@barba/core"></script>
    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        void: '#000000', orbitGreen: '#2BA648', orbitDark: '#0F3918',
                    },
                    fontFamily: {
                        sans: ['"Host Grotesk"', 'sans-serif'], syncopate: ['"Syncopate"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>

<body data-barba="wrapper" class="antialiased selection:bg-orbitGreen selection:text-void bg-black text-white overflow-x-hidden">

    <div class="page-transition">
        <div class="transition-panel"></div>
        <div class="transition-panel"></div>
        <div class="transition-panel"></div>
    </div>

    <!-- loading screen -->
    <div id="loading-screen"
        style="position: fixed; inset: 0; z-index: 50; display: flex; justify-content: center; align-items: center; background-color: #000; font-family: 'Syncopate', sans-serif; font-size: 2rem; color: #2BA648; flex-direction: column; gap: 1rem;">
        <img src="./image-assets/white-no bg.png" class="w-8 h-8 animate-[spin_4s_linear_infinite]" alt="loader">
    </div>

    <div class="blueprint-bg">
        <div class="bp-circle"></div>
        <div class="bp-line-h"></div>
        <div class="bp-line-v"></div>
        <div class="bp-line-d1"></div>
        <div class="bp-line-d2"></div>
    </div>

    <main data-barba="container" data-barba-namespace="events">
        <style>
        /* --- UNIFIED CSS --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Host Grotesk', sans-serif;
            background-color: #000;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar { display: none; }
        html { -ms-overflow-style: none; scrollbar-width: none; }

        /* Blueprint Background */
        .blueprint-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .bp-circle {
            position: absolute;
            width: 90vmin;
            height: 90vmin;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 50%;
        }

        .bp-line-h {
            position: absolute;
            width: 100vw;
            height: 1px;
            background: rgba(255, 255, 255, 0.05);
        }

        .bp-line-v {
            position: absolute;
            width: 1px;
            height: 100vh;
            background: rgba(255, 255, 255, 0.05);
        }

        .bp-line-d1 {
            position: absolute;
            width: 150vw;
            height: 1px;
            background: rgba(255, 255, 255, 0.03);
            transform: rotate(30deg);
        }

        .bp-line-d2 {
            position: absolute;
            width: 150vw;
            height: 1px;
            background: rgba(255, 255, 255, 0.03);
            transform: rotate(-30deg);
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            padding: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            mix-blend-mode: difference;
        }

        nav,
        .logo p {
            font-weight: 700;
            font-size: 0.9rem;
            font-family: "Host Grotesk", sans-serif;
        }

        .logo a {
            text-decoration: none;
            color: white;
        }

        .nav-items {
            display: flex;
            gap: 2rem;
        }

        .nav-items a {
            text-decoration: none;
            color: white;
            transition: color 0.3s;
        }

        .nav-items a:hover {
            color: #2BA648;
        }

        @media(max-width: 768px) {
            nav {
                padding: 1.2rem;
                flex-direction: column;
                gap: 0.8rem;
            }

            .nav-items {
                gap: 0.8rem;
                font-size: 0.75rem;
                flex-wrap: wrap;
                justify-content: center;
            }
        }

        /* Page Transitions */
        .page-transition {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
            pointer-events: none;
            display: flex;
        }

        .transition-panel {
            flex: 1;
            height: 100%;
            background-color: #2BA648;
            transform: translateY(100%);
            will-change: transform;
            box-shadow: 2px 0 0 #2BA648;
        }

        /* --- KINETIC MARQUEE SHUTTER --- */
        .marquee-gallery {
            position: relative;
            width: 100%;
            min-height: 100vh;
            padding: 15vh 0; /* Clear the navbar */
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            background: #000;
        }

        .marquee-row {
            position: relative;
            width: 100%;
            height: 18vh; /* Scale naturally */
            min-height: 120px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05); /* Architectural lines */
            cursor: pointer;
            overflow: hidden;
        }

        .marquee-row:first-child { border-top: 1px solid rgba(255,255,255,0.05); }

        /* The Image Shutter behind everything */
        .marquee-image-wrapper {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            /* initial state: slit / invisible */
            clip-path: polygon(0% 50%, 100% 50%, 100% 50%, 0% 50%);
            overflow: hidden;
        }

        .marquee-img {
            position: absolute;
            top: -20px; left: -20px;
            width: calc(100% + 40px);
            height: calc(100% + 40px); /* Buffer for parallax */
            object-fit: cover;
            transform: scale(1.1); /* Zoomed in initially */
            background: #111;
        }

        .marquee-overlay { position: absolute; inset: 0; background: rgba(0, 0, 0, 0.4); }

        /* The Continuous Marquee Engine */
        .marquee-track {
            position: relative;
            z-index: 10;
            display: flex;
            width: max-content;
            white-space: nowrap;
            animation: marquee-move var(--marquee-speed) linear infinite var(--marquee-dir);
            pointer-events: none;
        }

        @keyframes marquee-move {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .marquee-text {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(2.5rem, 8vw, 8rem);
            font-weight: 700;
            color: #fff;
            padding-right: 2vw;
            line-height: 1;
            text-transform: uppercase;
            transition: all 0.4s ease;
            -webkit-text-stroke: 0px rgba(255,255,255,0);
        }

        /* Hover Details injected inside the row */
        .marquee-hover-info {
            position: absolute;
            left: 5vw;
            z-index: 20;
            transform: translateY(50px);
            opacity: 0;
            pointer-events: none; /* Let hover hit the row */
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        @media(max-width: 768px) {
             .marquee-hover-info { flex-direction: column; gap: 0.8rem; align-items: flex-start; left: 1.5rem; transform: translateY(30px); }
             .marquee-row { height: 15vh; min-height: 100px; }
             .marquee-text { font-size: 2.2rem; }
             .z-btn-cyber { padding: 0.8rem 1.5rem; font-size: 0.7rem; }
             #btn-open-calendar { bottom: 2rem; right: 1rem; padding: 0.8rem 1.2rem; }
        }

        .marquee-hover-info .marquee-date { font-family: 'Host Grotesk', sans-serif; color: #2BA648; font-weight: 700; letter-spacing: 0.1em; font-size: 0.8rem; background: rgba(0,0,0,0.6); padding: 0.5rem 1rem; border-radius: 4px; backdrop-filter: blur(5px); }
        .marquee-hover-info .z-btn-cyber { pointer-events: auto; }

        /* The Cyber Button */
        .z-btn-cyber { padding: 1rem 3rem; border: 1px solid rgba(43, 166, 72, 0.5); background: rgba(0,0,0,0.6); color: #fff; text-decoration: none; font-family: 'Host Grotesk', sans-serif; text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.8rem; backdrop-filter: blur(5px); display: inline-block; transition: all 0.4s; position: relative; overflow: hidden; }
        .z-btn-cyber::before { content: ''; position: absolute; inset:0; background: #2BA648; transform: scaleX(0); transform-origin: left; transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); z-index: -1; }
        .z-btn-cyber:hover { color: #000; letter-spacing: 0.2em; font-weight: 700; border-color: #2BA648; box-shadow: 0 0 20px rgba(43, 166, 72, 0.4); }
        .z-btn-cyber:hover::before { transform: scaleX(1); }

        /* Calendar specific */
        .cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; color: #fff; border-radius: 4px; transition: all 0.3s; background: rgba(255,255,255,0.02); }
        .cal-day.empty { background: transparent; pointer-events: none; }
        .cal-day:not(.empty):hover { background: rgba(255,255,255,0.1); cursor: pointer; }
        .cal-day.has-event { background: rgba(43, 166, 72, 0.15); border: 1px solid #2BA648; color: #2BA648; font-weight: 700; cursor: pointer; box-shadow: 0 0 15px rgba(43, 166, 72, 0.2); }
        .cal-day.has-event:hover { background: #2BA648; color: #000; box-shadow: 0 0 20px rgba(43, 166, 72, 0.5); transform: scale(1.1); }
        
        .modal-overlay { position: fixed; inset: 0; z-index: 200; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.5s; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); background: rgba(0,0,0,0.8); }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-box { background: #0a0a0a; border: 1px solid rgba(43, 166, 72, 0.3); padding: 2rem; border-radius: 12px; width: 90vw; max-width: 500px; box-shadow: 0 0 50px rgba(43, 166, 72, 0.1); transform: scale(0.95); transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .modal-overlay.active .modal-box { transform: scale(1); }
        </style>

        <nav>
            <div class="logo"><a href="index.html" data-barba-prevent>ENIGMA.</a></div>
            <div class="nav-items">
                <a href="events.html" class="text-orbitGreen">Events</a>
                <a href="project.html">Projects</a>
                <a href="team.html">Team</a>
                <a href="contact.html">Contact</a>
            </div>
        </nav>

        <div class="marquee-gallery" id="marquee-gallery">
            <!-- Marquee Rows injected via JS -->
        </div>

        <!-- Float Calendar Trigger -->
        <button id="btn-open-calendar" class="z-btn-cyber fixed bottom-10 right-10 z-[100] flex items-center gap-2">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
            CALENDAR
        </button>

        <!-- Calendar Modal -->
        <div id="cyber-calendar-modal" class="modal-overlay">
            <div class="modal-box">
                <button id="btn-close-calendar" class="absolute top-4 right-4 text-white/50 hover:text-orbitGreen transition-colors">
                     <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
                
                <div class="flex justify-between items-center mb-6 mt-2">
                    <button id="cal-prev" class="text-orbitGreen hover:text-white transition-colors text-sm font-syncopate">&lt; PREV</button>
                    <h3 id="cal-month-year" class="font-syncopate text-xl text-white tracking-widest">MARCH 2026</h3>
                    <button id="cal-next" class="text-orbitGreen hover:text-white transition-colors text-sm font-syncopate">NEXT &gt;</button>
                </div>
                
                <div class="grid grid-cols-7 gap-2 mb-2 text-center text-xs font-host text-white/40 tracking-widest">
                    <div>SUN</div><div>MON</div><div>TUE</div><div>WED</div><div>THU</div><div>FRI</div><div>SAT</div>
                </div>
                
                <div id="cal-grid" class="grid grid-cols-7 gap-2 text-center font-host">
                    <!-- Days injected via JS -->
                </div>
            </div>
        </div>
    </main>

    <script src="./js/common.js"></script>
</body>

</html>
