<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ENIGMA | Events</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Host+Grotesk:ital,wght@0,300..800;1,300..800&family=Syncopate:wght@400;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/lenis@1.0.45/dist/lenis.min.js"></script>
    <script src="https://unpkg.com/@barba/core"></script>
    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        void: '#000000', orbitGreen: '#2BA648', orbitDark: '#0F3918',
                    },
                    fontFamily: {
                        sans: ['"Host Grotesk"', 'sans-serif'], syncopate: ['"Syncopate"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>

<body data-barba="wrapper" class="antialiased selection:bg-orbitGreen selection:text-void bg-black text-white overflow-x-hidden">

    <div class="page-transition">
        <div class="transition-panel"></div>
        <div class="transition-panel"></div>
        <div class="transition-panel"></div>
    </div>

    <!-- loading screen -->
    <div id="loading-screen"
        style="position: fixed; inset: 0; z-index: 50; display: flex; justify-content: center; align-items: center; background-color: #000; font-family: 'Syncopate', sans-serif; font-size: 2rem; color: #2BA648; flex-direction: column; gap: 1rem;">
        <img src="./image-assets/white-no bg.png" class="w-8 h-8 animate-[spin_4s_linear_infinite]" alt="loader">
    </div>

    <div class="blueprint-bg">
        <div class="bp-circle"></div>
        <div class="bp-line-h"></div>
        <div class="bp-line-v"></div>
        <div class="bp-line-d1"></div>
        <div class="bp-line-d2"></div>
    </div>

    <main data-barba="container" data-barba-namespace="events">
        <style>
        /* --- UNIFIED CSS --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Host Grotesk', sans-serif;
            background-color: #000;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar { display: none; }
        html { -ms-overflow-style: none; scrollbar-width: none; }

        /* Blueprint Background */
        .blueprint-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .bp-circle {
            position: absolute;
            width: 90vmin;
            height: 90vmin;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 50%;
        }

        .bp-line-h {
            position: absolute;
            width: 100vw;
            height: 1px;
            background: rgba(255, 255, 255, 0.05);
        }

        .bp-line-v {
            position: absolute;
            width: 1px;
            height: 100vh;
            background: rgba(255, 255, 255, 0.05);
        }

        .bp-line-d1 {
            position: absolute;
            width: 150vw;
            height: 1px;
            background: rgba(255, 255, 255, 0.03);
            transform: rotate(30deg);
        }

        .bp-line-d2 {
            position: absolute;
            width: 150vw;
            height: 1px;
            background: rgba(255, 255, 255, 0.03);
            transform: rotate(-30deg);
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            padding: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            mix-blend-mode: difference;
        }

        nav,
        .logo p {
            font-weight: 700;
            font-size: 0.9rem;
            font-family: "Host Grotesk", sans-serif;
        }

        .logo a {
            text-decoration: none;
            color: white;
        }

        .nav-items {
            display: flex;
            gap: 2rem;
        }

        .nav-items a {
            text-decoration: none;
            color: white;
            transition: color 0.3s;
        }

        .nav-items a:hover {
            color: #2BA648;
        }

        @media(max-width: 768px) {
            nav {
                padding: 1.2rem;
                flex-direction: column;
                gap: 0.8rem;
            }

            .nav-items {
                gap: 0.8rem;
                font-size: 0.75rem;
                flex-wrap: wrap;
                justify-content: center;
            }
        }

        /* Page Transitions */
        .page-transition {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
            pointer-events: none;
            display: flex;
        }

        .transition-panel {
            flex: 1;
            height: 100%;
            background-color: #2BA648;
            transform: translateY(100%);
            will-change: transform;
            box-shadow: 2px 0 0 #2BA648;
        }

        /* --- Z-TUNNEL GALLERY --- */
        .z-tunnel-viewport { position: relative; width: 100%; }
        .z-tunnel-fixed { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; perspective: 1500px; display: flex; justify-content: center; align-items: center; overflow: hidden; pointer-events: none; z-index: 10; }
        .z-tunnel-scene { position: absolute; top: 50%; left: 50%; width: 0; height: 0; transform-style: preserve-3d; }

        .hero-z-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 10; font-size: 4rem; pointer-events: none; }
        .hero-z-text p { font-size: 0.8rem; letter-spacing: 0.3em; margin-top: 1rem; opacity: 0.6; }
        .glow-text { text-shadow: 0 0 10px rgba(43, 166, 72, 0.4), 0 0 30px rgba(43, 166, 72, 0.2); }
        @media(min-width: 768px) { .hero-z-text { font-size: 7rem; } }

        .z-card { position: absolute; top: -200px; left: -160px; width: 320px; height: 400px; transform-style: preserve-3d; display: flex; align-items: flex-end; padding: 2rem; pointer-events: auto; }
        @media(min-width: 768px) { .z-card { top: -225px; left: -400px; width: 800px; height: 450px; padding: 4rem; } }

        .z-card-image-wrapper { position: absolute; inset: 0; border: 1px solid rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; transform: translateZ(-50px); box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 50px rgba(43, 166, 72, 0.05); transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .z-card-image-wrapper img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.4) grayscale(80%); transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        .z-card-gradient { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.1) 50%, transparent 100%); transition: opacity 0.5s; opacity: 0.8; }

        .z-card:hover .z-card-image-wrapper { border-color: rgba(43, 166, 72, 0.4); box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 80px rgba(43, 166, 72, 0.2); }
        .z-card:hover .z-card-image-wrapper img { filter: brightness(0.9) grayscale(0%); transform: scale(1.05); }
        .z-card:hover .z-card-gradient { opacity: 1; }

        .z-card-content { position: relative; z-index: 5; transform: translateZ(80px); transition: transform 0.5s ease; width: 100%; }
        .z-card:hover .z-card-content { transform: translateZ(120px); }
        
        .z-card-date { font-family: 'Host Grotesk', sans-serif; color: #2BA648; letter-spacing: 0.2em; font-size: 0.8rem; margin-bottom: 0.5rem; font-weight: 700; text-transform: uppercase; }
        .z-card-title { font-family: 'Syncopate', sans-serif; font-size: clamp(1.8rem, 4vw, 3.5rem); color: #fff; line-height: 1.1; margin-bottom: 2rem; text-shadow: 0 10px 30px rgba(0,0,0,0.8); }

        .z-btn-cyber { padding: 1rem 2.5rem; border: 1px solid rgba(43, 166, 72, 0.5); background: rgba(0,0,0,0.4); color: #2BA648; text-decoration: none; font-family: 'Host Grotesk', sans-serif; text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.8rem; backdrop-filter: blur(5px); transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); position: relative; overflow: hidden; display: inline-block; font-weight: 700; }
        .z-btn-cyber::before { content: ''; position: absolute; top: 0; left: 0; width: 0%; height: 100%; background: #2BA648; z-index: -1; transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .z-btn-cyber:hover { color: #000; letter-spacing: 0.2em; border-color: #2BA648; box-shadow: 0 0 20px rgba(43, 166, 72, 0.4); }
        .z-btn-cyber:hover::before { width: 100%; }

        .z-card-number { position: absolute; top: -10%; right: -5%; font-family: 'Syncopate', sans-serif; font-size: clamp(5rem, 15vw, 12rem); font-weight: 700; -webkit-text-stroke: 1px rgba(255,255,255,0.05); color: transparent; z-index: 0; transform: translateZ(-100px); pointer-events: none; transition: transform 0.5s; }
        .z-card:hover .z-card-number { transform: translateZ(-80px); -webkit-text-stroke: 1px rgba(43, 166, 72, 0.1); }

        .scroll-progress { position: absolute; right: 2rem; top: 50%; transform: translateY(-50%); width: 2px; height: 30vh; background: rgba(255,255,255,0.05); z-index: 10; border-radius: 2px; pointer-events: none; }
        .scroll-progress-bar { width: 100%; height: 0%; background: #2BA648; border-radius: 2px; box-shadow: 0 0 10px #2BA648; }

        @media(max-width: 768px) {
            .z-card { width: 85vw; left: -42.5vw; height: 60vh; top: -30vh; padding: 1.5rem; }
            .scroll-progress { right: 1rem; }
            .hero-z-text { width: 100%; padding: 0 1rem; }
        }
        </style>

        <nav>
            <div class="logo"><a href="index.html" data-barba-prevent>ENIGMA.</a></div>
            <div class="nav-items">
                <a href="events.html" class="text-orbitGreen">Events</a>
                <a href="project.html">Projects</a>
                <a href="team.html">Team</a>
                <a href="contact.html">Contact</a>
            </div>
        </nav>

        <div class="z-tunnel-viewport">
            <div class="z-tunnel-fixed">
                <div class="hero-z-text font-syncopate glow-text">
                    OUR<br><span class="text-orbitGreen">EVENTS</span>
                    <p class="font-sans text-white">DESCEND INTO THE ARCHIVES</p>
                </div>
                
                <div class="z-tunnel-scene" id="tunnel-scene">
                    <!-- Events injected via JS -->
                </div>
                
                <div class="scroll-progress">
                    <div class="scroll-progress-bar"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="./js/common.js"></script>
</body>

</html>
