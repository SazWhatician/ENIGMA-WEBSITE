<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENIGMA</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Host+Grotesk:ital,wght@0,300..800;1,300..800&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/lenis@1.0.45/dist/lenis.min.js"></script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "./shader2.js": "./shader2.js"
            }
        }
    </script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        void: '#000000',
                        orbitGreen: '#2BA648',
                        orbitDark: '#0F3918',
                    },
                    fontFamily: {
                        sans: ['"Host Grotesk"', 'sans-serif'],
                        syncopate: ['"Syncopate"', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        /* --- GLOBAL RESET & BASE --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* Prevents text highlighting globally */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        body {
            font-family: "Host Grotesk", sans-serif;
            background-color: #000;
            color: #fff;
            overflow-x: hidden; 
        }

        ::-webkit-scrollbar { display: none; }
        html { -ms-overflow-style: none; scrollbar-width: none; }

        /* --- NAVIGATION --- */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            padding: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            mix-blend-mode: difference; 
        }

        nav, .logo p { font-weight: 700; font-size: 0.9rem; }
        .nav-items { display: flex; gap: 2rem; }
        .nav-items p { font-weight: 450; font-size: 0.9rem; cursor: pointer;}

        @media(max-width: 1000px){
            nav { flex-direction: column; gap: 1rem; }
        }

        /* --- HERO SECTION --- */
        .hero-section {
            position: relative;
            width: 100vw;
            height: 100vh; /* Fallback */
            height: 100svh; /* Static viewport height prevents jumping on mobile */
            overflow: hidden;
        }

        .gradient-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        .hero-fade-bottom {
            position: absolute;
            bottom: -1px; 
            left: 0;
            width: 100vw; height: 15vh;
            background: linear-gradient(to bottom, transparent, #000000);
            z-index: 5;
            pointer-events: none;
        }

        .hero-logo {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 25%;
            z-index: 2;
            pointer-events: none;
        }

        .hero-footer {
            position: absolute;
            bottom: 0; left: 0;
            width: 100vw;
            padding: 2rem;
            display: flex;
            justify-content: space-between;
            z-index: 10;
            font-size: 0.9rem;
            pointer-events: none;
        }

        @media(max-width: 1000px){ .hero-logo { width: 50%; } }

        /* --- SLIDER SECTION --- */
        .slider-section {
            position: relative;
            width: 100vw;
            height: 100vh;
            height: 100svh;
            background: linear-gradient(to bottom, #000000 0%, #0F3918 50%, #000000 100%);
            z-index: 10;
            cursor: grab;
            overflow: hidden;
            touch-action: pan-y;
        }
        .slider-section:active { cursor: grabbing; }

        .section-heading {
            position: absolute;
            top: 12%;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Syncopate', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 0.4em;
            color: #2BA648; 
            text-transform: uppercase;
            z-index: 5;
            pointer-events: none;
        }

        .title-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(4rem, 12vw, 15rem);
            font-weight: 700;
            color: rgba(255, 255, 255, 0.03);
            white-space: nowrap;
            pointer-events: none;
        }

        .slide {
            position: absolute;
            left: 0; 
            top: 50%;
            width: 22vw; 
            height: 65vh;
            margin-top: -32.5vh; 
            overflow: hidden;
            will-change: transform;
        }

        .slide-inner {
            position: relative;
            width: 100%; height: 100%;
            overflow: hidden;
            border-radius: 8px;
        }

        .slide img {
            position: absolute;
            top: 0; left: -30%; 
            width: 160% !important; 
            min-width: 160% !important;
            max-width: none !important; 
            height: 100% !important;
            object-fit: cover !important;
            display: block;
            will-change: transform;
            filter: grayscale(40%) brightness(0.5); 
            transition: filter 0.5s ease;
            pointer-events: none; 
            -webkit-user-drag: none; 
            backface-visibility: hidden; 
            -webkit-backface-visibility: hidden;
            transform: translateZ(0); 
        }

        .slide:hover img { filter: grayscale(0%) brightness(0.8); }

        .glass-panel {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80%; max-width: 220px;
            background: rgba(43, 166, 72, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(43, 166, 72, 0.15);
            border-radius: 16px;
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            z-index: 5;
            transition: all 0.4s ease;
            pointer-events: none;
            text-align: center;
        }

        .slide:hover .glass-panel {
            background: rgba(43, 166, 72, 0.15);
            transform: translate(-50%, -50%) scale(1.05);
            border-color: rgba(43, 166, 72, 0.4);
        }

        .glass-panel svg { width: 42px; height: 42px; stroke-width: 1.5; margin-bottom: 1rem; }
        .glass-panel h3 {
            font-family: 'Syncopate', sans-serif;
            font-size: 0.75rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.05em;
            margin: 0; line-height: 1.4;
        }

        .slide-info {
            position: absolute;
            bottom: -2.5rem; left: 0; width: 100%;
            display: flex;
            font-family: 'Syncopate', sans-serif;
            font-size: 0.8rem; letter-spacing: 0.05em;
            opacity: 0.5;
        }

        @media (max-width: 900px) {
            .slide { width: 55vw; height: 50vh; margin-top: -25vh; }
            .glass-panel { width: 85%; padding: 1.5rem 1rem; }
            .glass-panel svg { width: 32px; height: 32px; margin-bottom: 0.75rem; }
            .glass-panel h3 { font-size: 0.65rem; }
            .section-heading { font-size: 0.75rem; top: 10%; }
        }

        /* --- FOOTER SECTION --- */
        :root { 
            --base-orbit: #000000; 
            --accent-glow: #2BA648; 
        }
        
        .reactor-zone h1 { font-weight: 300; font-size: clamp(3rem, 5vw, 6rem); margin: 0; line-height: 1; letter-spacing: -0.02em; }
        .reactor-zone h3 { font-weight: 400; font-size: clamp(1.25rem, 1.75vw, 2.5rem); margin: 0; color: #94a3b8; }
        
        .reactor-zone a { 
            text-decoration: none; color: #fff; display: block;
            font-size: clamp(1.25rem,1.75vw,2.5rem); font-weight: 300; transition: all 0.4s ease;
        }
        .reactor-zone a:hover { color: var(--accent-glow); transform: translateX(10px); text-shadow: 0 0 10px rgba(43, 166, 72, 0.5); }
        
        .glow-text { 
            text-shadow: 0 0 5px rgba(43, 166, 72, 0.8), 0 0 20px rgba(24, 93, 40, 0.5);
        }

        footer {
            position: relative; width: 100%; 
            height: 100vh; height: 100svh;
            background-color: var(--base-orbit); overflow: hidden; z-index: 1; 
        }
        .footer-container {
            position: relative; width: 100%; height: 100%; padding: 3rem;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        #footer-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; }
        .footer-content {
            position: relative; width: 100%; height: 100%; z-index: 1; padding-top: 100px;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .footer-row { display: flex; justify-content: space-between; width: 100%; }
        .footer-col { flex: 1; }
        .footer-col-right { flex: 1; display: flex; gap: 4rem; justify-content: flex-end; }
        .footer-sub-col { display: flex; flex-direction: column; gap: 1rem; text-align: right;}
        
        @media(max-width: 1000px){
            .footer-row { flex-direction: column; gap: 4rem; }
            .footer-col-right { justify-content: flex-start; gap: 2rem; }
            .footer-sub-col { text-align: left; }
        }
    </style>
</head>

    <script type="module">
        import * as THREE from "three";
        import { vertexShader, fluidShader, displayShader } from "./shader2.js";

        // ==========================================
        // A. SMOOTH SCROLLING (Lenis & GSAP)
        // ==========================================
        gsap.registerPlugin(ScrollTrigger);
        const lenis = new Lenis({ duration: 1.2, easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)) });
        lenis.on('scroll', ScrollTrigger.update);
        gsap.ticker.add((time) => lenis.raf(time * 1000));
        gsap.ticker.lagSmoothing(0);


        // ==========================================
        // B. ORBIT HERO FLUID SHADER
        // ==========================================
        const config = {
            brushSize: 25.0, brushStrength: 0.5, distortionAmount: 2.5,
            fluidDecay: 0.98, trailLength: 0.8, stopDecay: 0.85,
            color1: "#000000", color2: "#034409", color3: "#011803", color4: "#000000",
            colorIntensity: 1.0, softness: 1.0,
        };

        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16) / 255;
            const g = parseInt(hex.slice(3, 5), 16) / 255;
            const b = parseInt(hex.slice(5, 7), 16) / 255;
            return [r, g, b];
        }

        const orbitCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        const orbitRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        
        const gradientCanvas = document.querySelector(".gradient-canvas");
        orbitRenderer.setSize(window.innerWidth, window.innerHeight);
        orbitRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        gradientCanvas.appendChild(orbitRenderer.domElement);

        const renderTargetParams = {
            minFilter: THREE.LinearFilter, magFilter: THREE.LinearFilter,
            format: THREE.RGBAFormat, type: THREE.HalfFloatType, 
        };

        const fluidTarget1 = new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight, renderTargetParams);
        const fluidTarget2 = new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight, renderTargetParams);
        let currentFluidTarget = fluidTarget1;
        let previousFluidTarget = fluidTarget2;
        let frameCount = 0;

        const fluidMaterial = new THREE.ShaderMaterial({
            uniforms: {
                iTime: { value: 0 },
                iResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
                iMouse: { value: new THREE.Vector4(0, 0, 0, 0) },
                iFrame: { value: 0 },
                iPreviousFrame: { value: null },
                uBrushSize: { value: config.brushSize },
                uBrushStrength: { value: config.brushStrength },
                uFluidDecay: { value: config.fluidDecay },
                uTrailLength: { value: config.trailLength },
                uStopDecay: { value: config.stopDecay },
            },
            vertexShader: vertexShader,
            fragmentShader: fluidShader,
        });

        const displayMaterial = new THREE.ShaderMaterial({
            uniforms: {
                iTime: { value: 0 },
                iResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
                iFluid: { value: null },
                uDistortionAmount: { value: config.distortionAmount },
                uColor1: { value: new THREE.Vector3(...hexToRgb(config.color1)) },
                uColor2: { value: new THREE.Vector3(...hexToRgb(config.color2)) },
                uColor3: { value: new THREE.Vector3(...hexToRgb(config.color3)) },
                uColor4: { value: new THREE.Vector3(...hexToRgb(config.color4)) },
                uColorIntensity: { value: config.colorIntensity },
                uSoftness: { value: config.softness },
            },
            vertexShader: vertexShader,
            fragmentShader: displayShader,
        });

        const geometry = new THREE.PlaneGeometry(2, 2);
        const fluidPlane = new THREE.Mesh(geometry, fluidMaterial);
        const displayPlane = new THREE.Mesh(geometry, displayMaterial);

        let mouseX = 0, mouseY = 0, prevMouseX = 0, prevMouseY = 0, lastMoveTime = 0;

        document.querySelector('.hero-section').addEventListener("mousemove", (e) => {
            const rect = gradientCanvas.getBoundingClientRect();
            prevMouseX = mouseX; prevMouseY = mouseY;
            mouseX = e.clientX - rect.left;
            mouseY = rect.height - (e.clientY - rect.top);
            lastMoveTime = performance.now();
            fluidMaterial.uniforms.iMouse.value.set(mouseX, mouseY, prevMouseX, prevMouseY);
        });

        document.querySelector('.hero-section').addEventListener("mouseleave", () => {
            fluidMaterial.uniforms.iMouse.value.set(0, 0, 0, 0);
        });


        // ==========================================
        // C. INFINITE SLIDER LOGIC
        // ==========================================
        const slides = document.querySelectorAll('.slide');
        const images = document.querySelectorAll('.slide img');
        let targetX = 0, currentX = 0;
        const ease = 0.075;
        let windowWidth, slideWidth, gap, step, totalWidth;

        function initDimensions() {
            windowWidth = window.innerWidth;
            slideWidth = slides[0].offsetWidth; 
            gap = windowWidth * 0.08; 
            step = slideWidth + gap; 
            totalWidth = step * slides.length; 
        }
        initDimensions();

        const sliderSection = document.querySelector('.slider-section');
        let isDragging = false;
        let startX = 0;

        sliderSection.addEventListener('mousedown', (e) => { isDragging = true; startX = e.clientX; });
        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const delta = e.clientX - startX;
            targetX -= delta * 1.5; 
            startX = e.clientX;
        });
        window.addEventListener('mouseup', () => isDragging = false);

        sliderSection.addEventListener('touchstart', (e) => { isDragging = true; startX = e.touches[0].clientX; }, {passive: true});
        window.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const delta = e.touches[0].clientX - startX;
            targetX -= delta * 2;
            startX = e.touches[0].clientX;
        }, {passive: true});
        window.addEventListener('touchend', () => isDragging = false);


        // ==========================================
        // D. FOOTER CRYSTAL 3D SCENE
        // ==========================================
        const footerContainerEl = document.getElementById("footer-canvas");
        const footerScene = new THREE.Scene();
        footerScene.fog = new THREE.FogExp2(0x000000, 0.1);

        const footerCamera = new THREE.PerspectiveCamera(75, footerContainerEl.offsetWidth / footerContainerEl.offsetHeight, 0.1, 1000);
        footerCamera.position.set(0, 0, 5); 
        const footerRenderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        footerRenderer.setSize(footerContainerEl.offsetWidth, footerContainerEl.offsetHeight);
        footerRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        footerRenderer.toneMapping = THREE.ReinhardToneMapping;
        footerContainerEl.appendChild(footerRenderer.domElement);

        footerScene.add(new THREE.AmbientLight(0x000000));
        
        const pointLight = new THREE.PointLight(0x2BA648, 5, 50); 
        pointLight.position.set(0, 0, 0);
        footerScene.add(pointLight);
        
        const rimLight = new THREE.DirectionalLight(0x185D28, 4); 
        rimLight.position.set(5, 5, 5);
        footerScene.add(rimLight);

        const crystalGroup = new THREE.Group();
        footerScene.add(crystalGroup);

        // Solid inner crystal core
        const innerCrystal = new THREE.Mesh(
            new THREE.OctahedronGeometry(1.2, 0),
            new THREE.MeshStandardMaterial({ 
                color: 0x2BA648, 
                emissive: 0x0F3918, 
                emissiveIntensity: 1, 
                roughness: 0.1, 
                metalness: 0.8 
            })
        );
        crystalGroup.add(innerCrystal);

        // Delicate outer wireframe cage
        const outerCage = new THREE.Mesh(
            new THREE.IcosahedronGeometry(1.6, 0),
            new THREE.MeshStandardMaterial({ 
                color: 0xffffff, 
                wireframe: true, 
                transparent: true, 
                opacity: 0.25 
            })
        );
        crystalGroup.add(outerCage);

        // Ambient Particles
        const particlesGeo = new THREE.BufferGeometry();
        const posArray = new Float32Array(800 * 3);
        for(let i=0; i<800 * 3; i++) posArray[i] = (Math.random()-0.5)*12;
        particlesGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const particles = new THREE.Points(
            particlesGeo, 
            new THREE.PointsMaterial({ size: 0.015, color: 0x2BA648, transparent: true, opacity: 0.6 })
        );
        crystalGroup.add(particles);

        const footerMouse = { x: 0, y: 0 };
        document.querySelector('footer').addEventListener("mousemove", (e) => {
            footerMouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            footerMouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        const footerContentContainer = document.querySelector(".footer-container");
        gsap.set(footerContentContainer, { yPercent: -50 });
        let scrollProgress = 0;
        
        ScrollTrigger.create({
            trigger: "footer", start: "top bottom", end: "bottom bottom", scrub: true,
            onUpdate: (self) => {
                scrollProgress = self.progress;
                gsap.set(footerContentContainer, { yPercent: -50 * (1 - scrollProgress) });
            }
        });


        // ==========================================
        // E. UNIFIED RENDER LOOP & RESIZE HANDLER
        // ==========================================
        let currentWindowWidth = window.innerWidth;

        window.addEventListener("resize", () => {
            // CRITICAL FIX: Ignore resize events on mobile caused strictly by scrolling (address bar hide/show)
            if (window.innerWidth === currentWindowWidth) return;
            currentWindowWidth = window.innerWidth;

            const width = window.innerWidth;
            const height = window.innerHeight;

            orbitRenderer.setSize(width, height);
            fluidMaterial.uniforms.iResolution.value.set(width, height);
            displayMaterial.uniforms.iResolution.value.set(width, height);
            fluidTarget1.setSize(width, height);
            fluidTarget2.setSize(width, height);
            frameCount = 0;

            initDimensions();

            ScrollTrigger.refresh();
            footerCamera.aspect = footerContainerEl.offsetWidth / footerContainerEl.offsetHeight;
            footerCamera.updateProjectionMatrix();
            footerRenderer.setSize(footerContainerEl.offsetWidth, footerContainerEl.offsetHeight);
        });

        function renderAll() {
            requestAnimationFrame(renderAll);
            const time = performance.now() * 0.001;

            fluidMaterial.uniforms.iTime.value = time;
            displayMaterial.uniforms.iTime.value = time;
            fluidMaterial.uniforms.iFrame.value = frameCount;

            if (performance.now() - lastMoveTime > 100) { fluidMaterial.uniforms.iMouse.value.set(0, 0, 0, 0); }

            fluidMaterial.uniforms.iPreviousFrame.value = previousFluidTarget.texture;
            orbitRenderer.setRenderTarget(currentFluidTarget);
            orbitRenderer.render(fluidPlane, orbitCamera);

            displayMaterial.uniforms.iFluid.value = currentFluidTarget.texture;
            orbitRenderer.setRenderTarget(null);
            orbitRenderer.render(displayPlane, orbitCamera);

            const temp = currentFluidTarget;
            currentFluidTarget = previousFluidTarget;
            previousFluidTarget = temp;
            frameCount++;

            currentX += (targetX - currentX) * ease;
            slides.forEach((slide, i) => {
                let x = (i * step) - currentX;
                x = ((x + step) % totalWidth + totalWidth) % totalWidth - step;
                slide.style.transform = `translateX(${x}px)`;

                const slideCenter = x + (slideWidth / 2);
                const screenCenter = windowWidth / 2;
                const distFromCenter = slideCenter - screenCenter;
                const parallaxAmount = distFromCenter * 0.25;
                images[i].style.transform = `translateX(${-parallaxAmount}px) scale(1.05)`;
            });

            // --- NEW CRYSTAL ANIMATION LOGIC ---
            innerCrystal.rotation.y += 0.01;
            innerCrystal.rotation.x += 0.005;
            
            outerCage.rotation.y -= 0.005;
            outerCage.rotation.z += 0.002;
            
            particles.rotation.y += 0.001;
            
            // Pulsing scale effect on the inner core
            const scale = 1 + Math.sin(time * 2) * 0.05;
            innerCrystal.scale.set(scale, scale, scale);
            
            // Movement and tracking logic
            const targetZ = -5 + (scrollProgress * 5);
            crystalGroup.position.z += (targetZ - crystalGroup.position.z) * 0.05;
            crystalGroup.rotation.x += (footerMouse.y * 0.2 - crystalGroup.rotation.x) * 0.05;
            crystalGroup.rotation.y += (footerMouse.x * 0.2 - crystalGroup.rotation.y) * 0.05;
            
            footerRenderer.render(footerScene, footerCamera);
        }

        renderAll();
    </script>
</body>
</html>
