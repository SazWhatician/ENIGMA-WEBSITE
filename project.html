<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ENIGMA | Projects</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Host+Grotesk:ital,wght@0,300..800;1,300..800&family=Syncopate:wght@400;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://unpkg.com/@barba/core"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        void: '#000000', orbitGreen: '#2BA648', orbitDark: '#0F3918',
                    },
                    fontFamily: {
                        sans: ['"Host Grotesk"', 'sans-serif'], syncopate: ['"Syncopate"', 'sans-serif'],
                    }
                }
            }
        }
    </script>

</head>

<body data-barba="wrapper">

    <div class="page-transition">
        <div class="transition-panel"></div>
        <div class="transition-panel"></div>
        <div class="transition-panel"></div>
    </div>

    <div class="blueprint-bg">
        <div class="bp-circle"></div>
        <div class="bp-line-h"></div>
        <div class="bp-line-v"></div>
        <div class="bp-line-d1"></div>
        <div class="bp-line-d2"></div>
    </div>

    <div id="loading-screen"
        style="position: fixed; inset: 0; z-index: 50; display: flex; justify-content: center; align-items: center; background-color: #000; font-family: 'Syncopate', sans-serif; font-size: 2rem; color: #2BA648; flex-direction: column; gap: 1rem;">
        <img src="./image-assets/white-no bg.png" class="w-8 h-8 animate-[spin_4s_linear_infinite]">
    </div>

    <main data-barba="container" data-barba-namespace="projects">
        <style>
            /* --- UNIFIED CSS --- */
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                background-color: #000;
                color: #fff;
                min-height: 100vh;
                overflow-x: hidden;
                font-family: 'Host Grotesk', sans-serif;
            }

            .blueprint-bg {
                position: fixed;
                inset: 0;
                z-index: 0;
                pointer-events: none;
                display: flex;
                justify-content: center;
                align-items: center;
            }

            .bp-circle {
                position: absolute;
                width: 90vmin;
                height: 90vmin;
                border: 1px solid rgba(255, 255, 255, 0.05);
                border-radius: 50%;
            }

            .bp-line-h {
                position: absolute;
                width: 100vw;
                height: 1px;
                background: rgba(255, 255, 255, 0.05);
            }

            .bp-line-v {
                position: absolute;
                width: 1px;
                height: 100vh;
                background: rgba(255, 255, 255, 0.05);
            }

            .bp-line-d1 {
                position: absolute;
                width: 150vw;
                height: 1px;
                background: rgba(255, 255, 255, 0.03);
                transform: rotate(30deg);
            }

            .bp-line-d2 {
                position: absolute;
                width: 150vw;
                height: 1px;
                background: rgba(255, 255, 255, 0.03);
                transform: rotate(-30deg);
            }

            nav {
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                padding: 2rem;
                display: flex;
                justify-content: space-between;
                align-items: center;
                z-index: 100;
                mix-blend-mode: difference;
            }

            nav,
            .logo p {
                font-weight: 700;
                font-size: 0.9rem;
                font-family: "Host Grotesk", sans-serif;
            }

            .logo a {
                text-decoration: none;
                color: white;
            }

            .nav-items {
                display: flex;
                gap: 2rem;
            }

            .nav-items a {
                text-decoration: none;
                color: white;
                transition: color 0.3s;
            }

            .nav-items a:hover {
                color: #2BA648;
            }

            @media(max-width: 768px) {
                nav {
                    padding: 1.2rem;
                    flex-direction: column;
                    gap: 0.8rem;
                }

                .nav-items {
                    gap: 0.8rem;
                    font-size: 0.75rem;
                    flex-wrap: wrap;
                    justify-content: center;
                }
            }

            .reel-container {
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                z-index: 10;
            }

            .project-item {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                will-change: transform;
            }

            .project-content {
                width: 100%;
                max-width: 1600px;
                padding: 0 4rem;
                display: grid;
                grid-template-columns: 1fr 2fr 1fr;
                gap: 2rem;
                align-items: center;
            }

            .project-counter {
                font-family: 'Syncopate', sans-serif;
                font-size: clamp(4rem, 10vw, 12rem);
                line-height: 0.8;
                letter-spacing: -0.05em;
                color: transparent;
                -webkit-text-stroke: 1px rgba(255, 255, 255, 0.2);
                transition: all 0.5s ease;
            }

            .project-counter span {
                font-size: 2rem;
                -webkit-text-stroke: 0;
                color: rgba(255, 255, 255, 0.3);
            }

            .is-active .project-counter {
                color: #2BA648;
                -webkit-text-stroke: 0;
            }

            .project-image-wrap {
                display: block;
                position: relative;
                width: 100%;
                height: 60vh;
                overflow: hidden;
                border-radius: 4px;
                box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
                cursor: pointer;
                transition: transform 0.5s ease;
            }

            .project-image {
                position: absolute;
                top: -20%;
                left: 0;
                width: 100%;
                height: 140%;
                object-fit: cover;
                filter: grayscale(80%);
            }

            .is-active .project-image {
                filter: grayscale(0%);
            }

            .project-info {
                text-align: right;
            }

            .project-title {
                font-family: 'Syncopate', sans-serif;
                font-size: clamp(1.5rem, 3vw, 2.5rem);
            }

            .project-title a {
                text-decoration: none;
                color: inherit;
                transition: color 0.3s ease;
            }

            .project-title a:hover {
                color: #2BA648;
            }

            .project-desc {
                font-family: 'Host Grotesk', sans-serif;
                font-size: 0.9rem;
                color: #94a3b8;
                max-width: 300px;
                margin-left: auto;
            }

            @media (max-width: 1024px) {
                .project-content {
                    display: flex;
                    flex-direction: column;
                    padding: 0 1.5rem;
                    justify-content: center;
                    height: 100%;
                }

                .project-counter {
                    position: relative;
                    font-size: clamp(3.5rem, 12vw, 5rem);
                    text-align: left;
                    width: 100%;
                    max-width: 500px;
                    margin: 0 auto 0.5rem auto;
                    order: 1;
                    z-index: 2;
                    line-height: 1;
                }

                .project-counter span {
                    font-size: 1.5rem;
                }

                .project-image-wrap {
                    height: 40vh;
                    width: 100%;
                    max-width: 500px;
                    margin: 0 auto;
                    order: 2;
                    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
                }

                .project-info {
                    text-align: left;
                    width: 100%;
                    max-width: 500px;
                    margin: 1.5rem auto 0 auto;
                    order: 3;
                }

                .project-desc {
                    margin: 0;
                    max-width: 100%;
                }

                .project-title {
                    font-size: clamp(1.5rem, 6vw, 2rem);
                    margin-bottom: 0.5rem;
                }
            }

            .team-container {
                position: relative;
                z-index: 10;
                width: 100%;
                max-width: 1400px;
                margin: 0 auto;
                padding: 8rem 2rem 4rem 2rem;
                display: flex;
                flex-direction: column;
                gap: 3rem;
            }

            .team-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
                gap: 2rem;
                perspective: 1000px;
            }

            .team-card-wrapper {
                background-color: transparent;
                width: 100%;
                height: 350px;
                perspective: 1000px;
                cursor: pointer;
            }

            .card-inner {
                position: relative;
                width: 100%;
                height: 100%;
                text-align: center;
                transition: transform 0.8s;
                transform-style: preserve-3d;
            }

            .team-card-wrapper.flipped .card-inner {
                transform: rotateY(180deg);
            }

            .card-front,
            .card-back {
                position: absolute;
                width: 100%;
                height: 100%;
                backface-visibility: hidden;
                border-radius: 8px;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                padding: 2rem;
                border: 1px solid rgba(255, 255, 255, 0.1);
                background: #0a0a0a;
            }

            .card-avatar {
                width: 90px;
                height: 90px;
                border-radius: 50%;
                margin-bottom: 1.2rem;
                object-fit: cover;
                background-color: rgba(255, 255, 255, 0.03);
                border: 1px solid rgba(255, 255, 255, 0.1);
            }

            .card-back {
                transform: rotateY(180deg);
                background: #0f1c12;
            }

            .social-links {
                display: flex;
                flex-direction: column;
                gap: 1rem;
                width: 100%;
            }

            .social-links a {
                font-family: 'Host Grotesk', sans-serif;
                color: white;
                text-decoration: none;
                padding: 0.8rem;
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 4px;
                transition: all 0.3s ease;
                font-size: 0.9rem;
                text-transform: uppercase;
            }

            .project-counter,
            .project-image-wrap,
            .project-title,
            .project-desc,
            .team-card-wrapper {
                opacity: 0;
                visibility: hidden;
            }

            .page-transition {
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                z-index: 9999;
                pointer-events: none;
                display: flex;
            }

            .transition-panel {
                flex: 1;
                height: 100%;
                background-color: #2BA648;
                transform: translateY(100%);
                will-change: transform;
            }
        </style>
        <nav>
            <div class="logo"><a href="index.html" data-barba-prevent>ENIGMA.</a></div>
            <div class="nav-items">
                <a href="events.html">Events</a>
                <a href="project.html" class="text-orbitGreen">Projects</a>
                <a href="team.html">Team</a>
                <a href="contact.html">Contact</a>
            </div>
        </nav>
        <div class="reel-container"></div>
    </main>

    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <script src="./js/common.js"></script>
</body>

</html>
